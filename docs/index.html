<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读书打卡 - 共享版</title>
<style>
  :root {
    --blue: #4a6cf7;
    --green: #10b981;
    --gray: #f0f0f0;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f4f5f7; color: #333; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  .header {
    text-align: center; margin-bottom: 24px;
  }
  .header h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
  .header .sub { font-size: 13px; color: #999; }

  .toolbar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .toolbar label { font-size: 14px; color: #555; }
  .toolbar input[type="number"] {
    width: 52px; padding: 5px 6px; border: 1px solid #d0d0d0; border-radius: 6px;
    font-size: 14px; text-align: center;
  }
  .btn {
    padding: 7px 18px; border: none; border-radius: 8px; font-size: 14px;
    cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #3651d5; transform: translateY(-1px); }
  .btn-outline { background: #fff; color: #555; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }

  .table-wrap {
    background: #fff; border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th, td { padding: 8px 4px; text-align: center; font-size: 13px; border-bottom: 1px solid #eee; }
  th { background: var(--blue); color: #fff; font-weight: 500; white-space: nowrap; }
  .col-name { text-align: left; padding-left: 14px; width: 85px; white-space: nowrap; }
  .col-name.leader { color: #dc2626; font-weight: 700; }
  th.col-name { text-align: left; padding-left: 14px; }

  .group-header td {
    background: #eef1ff; font-weight: 700; font-size: 14px; color: var(--blue);
    padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--blue);
  }

  .cell {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    transition: all .2s; font-size: 16px; user-select: none;

  .cell:hover { background: #e8ecff; border-color: var(--blue); color: var(--blue); transform: scale(1.08); }
  .cell.checked { background: #d1fae5; border: 1.5px solid #6ee7b7; color: var(--green); cursor: pointer; }
  .cell.checked:hover { background: #a7f3d0; transform: scale(1.05); }
  .cell-img { background: #dbeafe; border-color: #93c5fd; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 1000;

  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff; border-radius: 16px; width: 90%; max-width: 440px;
    padding: 28px 24px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);

  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 17px; margin-bottom: 4px; color: #1a1a2e; }
  .modal .hint { font-size: 13px; color: #999; margin-bottom: 16px; }
  .modal textarea {
    width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 10px;

  .modal .file-row .upload-btn {

  .modal .modal-actions {

  .modal .btn-submit { background: var(--green); color: #fff; }

  .modal .btn-cancel { background: #f3f3f3; color: #666; }

  .section-title {

    display: flex; align-items: center; gap: 6px;

  .feed {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));

  }
  .card {
    background: #fff; border-radius: var(--radius); padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); display: flex; gap: 12px;
    transition: transform .15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card .avatar {
    width: 42px; height: 42px; border-radius: 50%; background: var(--blue);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .card .body { flex: 1; min-width: 0; }
  .card .meta { font-size: 12px; color: #999; margin-bottom: 4px; }
  .card .meta strong { color: #333; }
  .card .text { font-size: 14px; color: #444; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .card .img-row { margin-top: 8px; }
  .card .img-row img {
    max-width: 100%; max-height: 200px; border-radius: 8px; cursor: pointer;

  }
  .card .delete-btn {
    font-size: 12px; color: #ccc; cursor: pointer; background: none; border: none;
    padding: 2px 6px; margin-top: 6px;
  }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }

  .summary { text-align: right; font-size: 13px; color: #888; margin-top: 14px; }
  .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #bbb; padding-bottom: 30px; }
  .empty-feed { text-align: center; color: #ccc; padding: 40px; font-size: 14px; }

  .streak-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 3000;
    animation: fadeIn .2s;
  }
  .streak-card {
    background: #fff; border-radius: 20px; padding: 36px 32px 28px;
    text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    max-width: 360px; width: 90%;
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .streak-emoji { font-size: 72px; margin-bottom: 8px; animation: bounce 1s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .streak-days { font-size: 48px; font-weight: 800; color: var(--blue); line-height: 1; }
  .streak-msg { font-size: 18px; color: #333; margin: 10px 0 6px; font-weight: 600; }
  .streak-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
  .streak-milestones {
    display: flex; justify-content: center; gap: 8px; margin: 14px 0 20px; flex-wrap: wrap;
  }
  .streak-milestone {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: #f0f0f0; color: #888;
  }
  .streak-milestone.hit { background: #d1fae5; color: #059669; font-weight: 600; }

  .sync-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: #d1fae5; color: #059669; margin-left: 10px;
  }
  .sync-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .token-banner {
    background: #fef3c7; border: 1px solid #fcd34d; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #92400e;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .token-banner .set-btn {
    background: #f59e0b; color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  .token-banner .set-btn:hover { background: #d97706; }
  .token-banner.hidden { display: none; }

  .settings-modal input[type="password"] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; margin: 8px 0; outline: none;
  }
  .settings-modal input[type="password"]:focus { border-color: var(--blue); }
  .settings-modal .help { font-size: 12px; color: #888; line-height: 1.6; margin-top: 8px; }
  .settings-modal .help a { color: var(--blue); }
</style>

<body>
<div class="container">
  <div class="header">
    <h1>📖 读书打卡 <span class="sync-badge"><span class="dot"></span> 全员共享</span></h1>
    <div class="sub">所有人的打卡记录实时同步 · 点击格子打卡</div>
  </div>

  <div class="token-banner" id="tokenBanner">
    <span>⚠️ 还未设置打卡令牌，打卡功能需要先设置令牌才能保存数据</span>
    <button class="set-btn" onclick="openSettings()">设置令牌</button>
  </div>

  <div class="toolbar">
    <label>天数：</label>
    <input type="number" id="dayCount" value="7" min="1" max="31">
    <button class="btn btn-primary" onclick="fetchAndRender()">🔄 刷新</button>
    <button class="btn btn-outline" onclick="openSettings()">⚙️ 设置</button>
    <button class="btn btn-outline" onclick="exportData()">导出</button>
  </div>

  <div class="table-wrap"><table id="checkTable"></table></div>
  <div class="summary" id="summary"></div>

  <div class="section-title">📝 打卡动态</div>
  <div class="feed" id="feed"></div>
  <div class="empty-feed" id="emptyFeed">还没有打卡记录，点击表格格子开始吧 ~</div>

  <div class="footer">📖 读书打卡 · 数据通过 GitHub 云端共享</div>
</div>

<script>
// ===== 配置 =====
const GIST_ID = '9118572982a150ace89f2ba81ecb7999';
const GIST_RAW_URL = 'https://gist.githubusercontent.com/Bob-ui-coder/' + GIST_ID + '/raw/data.json';
const GIST_API_URL = 'https://api.github.com/gists/' + GIST_ID;

const groups = [
  { name: "第1组", members: ["Bob", "Jobs", "Evenc", "Jett", "Lovis"] },
  { name: "第2组", members: ["john", "Brendan", "Sookie", "Monty", "Ryan"] },
  { name: "第3组", members: ["Max", "jackie", "黎瑞", "ocean"] },
  { name: "第4组", members: ["Ezekiel", "Nora", "leon", "Jasper"] },
  { name: "第5组", members: ["Lina", "Tyler", "Ethan", "Richard", "Nox"] }
];

const LEADERS = new Set(["Evenc", "Brendan", "Max", "Ezekiel", "Ethan"]);

// ===== Token 管理 =====
function getToken() {
  return localStorage.getItem('reading_checkin_token') || '';
}

function setToken(token) {
  localStorage.setItem('reading_checkin_token', token);
}

function updateTokenBanner() {
  const banner = document.getElementById('tokenBanner');
  if (getToken()) {
    banner.classList.add('hidden');
  } else {
    banner.classList.remove('hidden');
  }
}

// ===== 设置弹窗 =====
function openSettings() {
  const currentToken = getToken();
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="settingsOverlay">
      <div class="modal settings-modal">
        <h3>⚙️ 设置打卡令牌</h3>
        <div class="hint">用于保存打卡数据到云端共享</div>
        <input type="password" id="tokenInput" value="${currentToken}" placeholder="粘贴 GitHub Token（以 ghp_ 或 github_pat_ 开头）">
        <div class="help">
          <strong>如何获取令牌？</strong><br>
          1. 打开 <a href="https://github.com/settings/tokens/new?scopes=gist&description=reading-checkin" target="_blank">GitHub Token 创建页</a><br>
          2. 勾选 <code>gist</code> 权限<br>
          3. 点击底部 "Generate token"<br>
          4. 复制生成的 token，粘贴到上方输入框<br>
          5. 点击保存即可
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeSettings()">取消</button>
          <button class="btn btn-submit" onclick="saveSettings()">保存</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('settingsOverlay').addEventListener('click', e => {
    if (e.target.id === 'settingsOverlay') closeSettings();
  });
}

function closeSettings() {
  const el = document.getElementById('settingsOverlay');
  if (el) el.remove();
}

function saveSettings() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { alert('请输入令牌'); return; }
  setToken(token);
  closeSettings();
  updateTokenBanner();
  fetchAndRender();
}

// ===== Gist API =====
async function apiGetRecords() {
  const res = await fetch(GIST_RAW_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('获取数据失败: ' + res.status);
  const data = await res.json();
  return data.records || [];
}

async function apiSaveRecords(records) {
  const token = getToken();
  if (!token) throw new Error('未设置令牌，请先点击"设置"配置令牌');

  const content = JSON.stringify({ records }, null, 2);

  // 最多重试3次（处理并发冲突）
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      // 获取当前 Gist 的最新版本
      const getRes = await fetch(GIST_API_URL, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!getRes.ok) {
        const err = await getRes.json();
        throw new Error(err.message || '获取Gist失败');
      }
      const gist = await getRes.json();

      // 合并数据（防止覆盖其他人的打卡）
      let existingRecords = [];
      try {
        const existingContent = gist.files['data.json']?.content || '{"records":[]}';
        existingRecords = JSON.parse(existingContent).records || [];
      } catch (e) { /* ignore */ }

      // 合并：以新 records 为准，但保留 existingRecords 中不在新 records 里的记录
      const newKeys = new Set(records.map(r => r.key));
      const merged = [...records];
      for (const r of existingRecords) {
        if (!newKeys.has(r.key)) merged.push(r);
      }

      const mergedContent = JSON.stringify({ records: merged }, null, 2);

      // 更新 Gist
      const patchRes = await fetch(GIST_API_URL, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: {
            'data.json': { content: mergedContent }
          }
        })
      });

      if (patchRes.ok) return merged;
      if (patchRes.status === 409 && attempt < 2) {
        // 并发冲突，等待后重试
        await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
        continue;
      }
      const err = await patchRes.json();
      throw new Error(err.message || '保存失败');
    } catch (e) {
      if (attempt === 2) throw e;
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
    }
  }
}

async function apiCheckin(name, day, text, image) {
  const records = await apiGetRecords();
  const key = name + '_' + day;
  const idx = records.findIndex(r => r.key === key);
  const record = { key, name, day: parseInt(day), text: text || '', image: image || null, time: Date.now() };

  if (idx >= 0) records[idx] = record;
  else records.push(record);

  await apiSaveRecords(records);
  return record;
}

async function apiDelete(name, day) {
  const records = await apiGetRecords();
  const key = name + '_' + day;
  const filtered = records.filter(r => r.key !== key);
  await apiSaveRecords(filtered);
}

async function apiReset() {
  await apiSaveRecords([]);
}

// ===== 图片压缩 =====
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ===== Modal =====
let modalTarget = null;
function openModal(name, day) {
  modalTarget = { name, day };
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3>${name} · Day ${day}</h3>
        <div class="hint">记录你的读书心得</div>
        <textarea id="modalText" placeholder="今天读了什么书？有什么收获？"></textarea>
        <div class="file-row">
          <label class="upload-btn">
            📷 添加图片
            <input type="file" id="modalFile" accept="image/*" style="display:none" onchange="previewFile(this)">
          </label>
          <img class="preview-thumb" id="previewThumb">
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-submit" onclick="submitCheckin()">✅ 打卡</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
}

function closeModal() {
  const el = document.getElementById('modalOverlay');
  if (el) el.remove();
  modalTarget = null;
}

let pendingImage = null;
async function previewFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('图片大小不能超过 5MB'); return; }
  const reader = new FileReader();
  reader.onload = async () => {
    // 压缩图片
    pendingImage = await compressImage(reader.result, 800, 0.6);
    document.getElementById('previewThumb').src = pendingImage;
    document.getElementById('previewThumb').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitCheckin() {
  if (!modalTarget) return;
  const text = document.getElementById('modalText').value.trim();
  if (!text && !pendingImage) { alert('至少填写一段心得或上传一张图片'); return; }

  if (!getToken()) {
    alert('请先设置打卡令牌！点击页面顶部的"设置令牌"按钮。');
    return;
  }

  const targetName = modalTarget.name;
  const targetDay = modalTarget.day;
  const imageData = pendingImage; // 保存图片引用，避免被 closeModal 后清空

  closeModal();
  pendingImage = null;

  // 显示加载提示
  const loadingEl = document.createElement('div');
  loadingEl.className = 'streak-overlay';
  loadingEl.id = 'loadingOverlay';
  loadingEl.innerHTML = '<div class="streak-card"><div class="streak-emoji" style="animation:none">⏳</div><div class="streak-msg">正在保存...</div></div>';
  document.body.appendChild(loadingEl);

  try {
    const savedRecord = await apiCheckin(targetName, targetDay, text, imageData || null);
    // 本地立即更新数据（不等 CDN 刷新）
    const idx = cachedRecords.findIndex(r => r.key === savedRecord.key);
    if (idx >= 0) cachedRecords[idx] = savedRecord;
    else cachedRecords.push(savedRecord);
    renderAll(cachedRecords);
    document.getElementById('loadingOverlay').remove();
    const streak = calcStreak(targetName);
    showStreakPopup(targetName, streak);
    // 延迟刷新一次，确保最终和服务器同步
    setTimeout(() => fetchAndRender(), 3000);
  } catch (e) {
    document.getElementById('loadingOverlay').remove();
    alert('保存失败: ' + e.message + '\n\n请检查令牌是否正确，或稍后重试。');
  }
}

// ===== Streak =====
let cachedRecords = [];

function calcStreak(name) {
  const days = cachedRecords
    .filter(r => r.name === name)
    .map(r => r.day)
    .sort((a, b) => b - a);

  if (days.length === 0) return 0;

  let streak = 1;
  for (let i = 0; i < days.length - 1; i++) {
    if (days[i] - days[i + 1] === 1) streak++;
    else break;
  }
  return streak;
}

const STREAK_EMOJIS = [
  { min: 30, emoji: '🌟', msg: '传奇读书人！', subtitle: '你已经把读书变成了习惯' },
  { min: 21, emoji: '🚀', msg: '超强自律！', subtitle: '21天养成一个好习惯，你做到了' },
  { min: 14, emoji: '👑', msg: '王中之王！', subtitle: '两周不间断，你是所有人的榜样' },
  { min: 10, emoji: '🎯', msg: '十全十美！', subtitle: '两位数连击，读书已入魂' },
  { min: 7,  emoji: '🏆', msg: '一周全勤！', subtitle: '整整一周都在读书，太强了' },
  { min: 5,  emoji: '💪', msg: '渐入佳境！', subtitle: '五天连读，越来越有感觉了' },
  { min: 3,  emoji: '🔥', msg: '开始上瘾！', subtitle: '第三天了，读书的快乐你懂的' },
  { min: 2,  emoji: '✨', msg: '再接再厉！', subtitle: '第二天，保持住这个节奏' },
  { min: 1,  emoji: '🌱', msg: '迈出第一步！', subtitle: '种下一颗读书的种子' },
];

const MILESTONES = [3, 7, 14, 21, 30, 50, 100];

function getStreakInfo(streak) {
  for (const item of STREAK_EMOJIS) {
    if (streak >= item.min) return item;
  }
  return STREAK_EMOJIS[STREAK_EMOJIS.length - 1];
}

function showStreakPopup(name, streak) {
  const info = getStreakInfo(streak);
  const milestonesHtml = MILESTONES.map(m => {
    const hit = streak >= m;
    return `<span class="streak-milestone${hit ? ' hit' : ''}">${hit ? '✅' : '🔒'} ${m}天</span>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'streak-overlay';
  overlay.id = 'streakOverlay';
  overlay.innerHTML = `
    <div class="streak-card">
      <div class="streak-emoji">${info.emoji}</div>
      <div class="streak-days">${streak}</div>
      <div style="font-size:13px;color:#999;">天</div>
      <div class="streak-msg">${info.msg}</div>
      <div class="streak-sub">${name}，${info.subtitle}</div>
      <div class="streak-milestones">${milestonesHtml}</div>
      <button class="btn btn-primary" style="margin-top:8px;font-size:15px;padding:10px 36px;" onclick="document.getElementById('streakOverlay').remove()">🎉 好的！继续加油</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
}

// ===== Table rendering =====
async function fetchAndRender() {
  try {
    cachedRecords = await apiGetRecords();
  } catch (e) {
    console.error('获取数据失败:', e);
    cachedRecords = [];
  }
  renderAll(cachedRecords);
}

function renderAll(allRecords) {
  const days = parseInt(document.getElementById('dayCount').value) || 7;
  const recordMap = {};
  allRecords.forEach(r => { recordMap[r.key] = r; });

  const table = document.getElementById('checkTable');
  let html = '<thead><tr><th class="col-name">姓名</th>';
  for (let d = 1; d <= days; d++) html += `<th>Day ${d}</th>`;
  html += '</tr></thead><tbody>';

  groups.forEach(group => {
    html += `<tr class="group-header"><td colspan="${days + 1}">${group.name}</td></tr>`;
    group.members.forEach(name => {
      html += '<tr>';
      html += `<td class="col-name${LEADERS.has(name) ? ' leader' : ''}">${name}</td>`;
      for (let d = 1; d <= days; d++) {
        const key = `${name}_${d}`;
        const rec = recordMap[key];
        const cls = rec ? (rec.image ? 'cell cell-img checked' : 'cell checked') : 'cell';
        const icon = rec ? '✓' : '+';
        html += `<td><span class="${cls}" data-name="${escapeHtml(name)}" data-day="${d}">${icon}</span></td>`;
      }
      html += '</tr>';
    });
  });

  html += '</tbody>';
  table.innerHTML = html;

  table.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      openModal(cell.dataset.name, parseInt(cell.dataset.day));
    });
  });

  document.getElementById('summary').textContent = `共 ${allRecords.length} 人次已打卡`;
  renderFeed(allRecords);
}

function renderFeed(records) {
  records.sort((a, b) => b.time - a.time);
  const feedEl = document.getElementById('feed');
  const emptyEl = document.getElementById('emptyFeed');
  if (records.length === 0) {
    feedEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  feedEl.innerHTML = records.map(r => {
    const initial = r.name.charAt(0).toUpperCase();
    const dateStr = new Date(r.time).toLocaleString('zh-CN', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    return `
      <div class="card">
        <div class="avatar">${initial}</div>
        <div class="body">
          <div class="meta"><strong>${r.name}</strong> · Day ${r.day} · ${dateStr}</div>
          ${r.text ? `<div class="text">${escapeHtml(r.text)}</div>` : ''}
          ${r.image ? `<div class="img-row"><img src="${r.image}" onclick="openLightbox(this.src)" loading="lazy"></div>` : ''}
          <button class="delete-btn" onclick="delRecord('${r.name}',${r.day})">删除此条</button>
        </div>
      </div>`;
  }).join('');
}

async function delRecord(name, day) {
  if (!confirm('删除这条打卡记录？')) return;
  if (!getToken()) { alert('请先设置令牌'); return; }
  try {
    await apiDelete(name, day);
    await fetchAndRender();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${src}">`;
  lb.addEventListener('click', () => lb.remove());
  document.body.appendChild(lb);
}

function exportData() {
  const records = cachedRecords.sort((a, b) => b.time - a.time);
  const text = records.map(r => {
    return `--- ${r.name} · Day ${r.day} · ${new Date(r.time).toLocaleString('zh-CN')} ---\n${r.text || '(无文字)'}\n${r.image ? '[含图片]' : ''}`;
  }).join('\n\n');
  const blob = new Blob([text || '暂无打卡记录'], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '读书打卡导出.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 初始化 =====
updateTokenBanner();
fetchAndRender();
// 每60秒自动刷新（降低频率避免CDN缓存问题）
setInterval(fetchAndRender, 60000);
</script>
