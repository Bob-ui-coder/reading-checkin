<!DOCTYPE html>
<!-- v3.6 - 2026-07-16 19:10 修复图片AI反馈（兼容DeepSeek纯文本API） -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>读书打卡 - 共享版 v2</title>
<style>
  :root {
    --blue: #4a6cf7;
    --green: #10b981;
    --gray: #f0f0f0;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f4f5f7; color: #333; padding: 20px; min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  .header {
    text-align: center; margin-bottom: 24px;
  }
  .header h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
  .header .sub { font-size: 13px; color: #999; }

  .toolbar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .toolbar label { font-size: 14px; color: #555; }
  .toolbar input[type="number"] {
    width: 52px; padding: 5px 6px; border: 1px solid #d0d0d0; border-radius: 6px;
    font-size: 14px; text-align: center;
  }
  .btn {
    padding: 7px 18px; border: none; border-radius: 8px; font-size: 14px;
    cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #3651d5; transform: translateY(-1px); }
  .btn-outline { background: #fff; color: #555; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }

  .table-wrap {
    background: #fff; border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th, td { padding: 8px 4px; text-align: center; font-size: 13px; border-bottom: 1px solid #eee; }
  th { background: var(--blue); color: #fff; font-weight: 500; white-space: nowrap; }
  .col-name { text-align: left; padding-left: 10px; width: 105px; white-space: nowrap; }
  .col-name.leader { color: #dc2626; font-weight: 700; }
  th.col-name { text-align: left; padding-left: 10px; }
  .col-name .streak-badge {
    font-size: 10px; font-weight: 500; margin-left: 2px;
  }
  .col-name .streak-badge.active { color: #f59e0b; }
  .col-name .streak-badge.zero { color: #d5d5d5; }

  .group-header td {
    background: #eef1ff; font-weight: 700; font-size: 14px; color: var(--blue);
    padding: 10px 14px; text-align: left; border-bottom: 2px solid var(--blue);
  }

  .cell {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    transition: all .2s; font-size: 16px; user-select: none;
    background: #f7f7f7; border: 1.5px dashed #d5d5d5; color: #bbb;
  }
  .cell:hover { background: #e8ecff; border-color: var(--blue); color: var(--blue); transform: scale(1.08); }
  .cell.checked { background: #d1fae5; border: 1.5px solid #6ee7b7; color: var(--green); cursor: pointer; }
  .cell.checked:hover { background: #a7f3d0; transform: scale(1.05); }
  .cell-img { background: #dbeafe; border-color: #93c5fd; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    animation: fadeIn .2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff; border-radius: 16px; width: 90%; max-width: 440px;
    max-height: 85vh; overflow-y: auto;
    padding: 28px 24px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: slideUp .25s;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 17px; margin-bottom: 4px; color: #1a1a2e; }
  .modal .hint { font-size: 13px; color: #999; margin-bottom: 16px; }
  .modal textarea {
    width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 10px;
    padding: 12px; font-size: 14px; font-family: inherit; resize: vertical;
    outline: none; transition: border .2s;
  }
  .modal textarea:focus { border-color: var(--blue); }
  .modal .file-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .modal .file-row .upload-btn {
    padding: 8px 16px; border: 1.5px dashed #ccc; border-radius: 8px;
    background: #fafafa; cursor: pointer; font-size: 13px; color: #666;
    transition: all .2s;
  }
  .modal .file-row .upload-btn:hover { border-color: var(--blue); color: var(--blue); }
  .modal .preview-thumb {
    max-width: 120px; max-height: 80px; border-radius: 8px; object-fit: cover;
    display: none;
  }
  .modal .modal-actions {
    display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;
  }
  .modal .btn-submit { background: var(--green); color: #fff; }
  .modal .btn-submit:hover { background: #059669; }
  .modal .btn-cancel { background: #f3f3f3; color: #666; }

  .section-title {
    font-size: 16px; font-weight: 600; color: #1a1a2e; margin: 28px 0 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .feed {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .card {
    background: #fff; border-radius: var(--radius); padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); display: flex; gap: 12px;
    transition: transform .15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card .avatar {
    width: 42px; height: 42px; border-radius: 50%; background: var(--blue);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .card .body { flex: 1; min-width: 0; }
  .card .meta { font-size: 12px; color: #999; margin-bottom: 4px; }
  .card .meta strong { color: #333; }
  .card .text { font-size: 14px; color: #444; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .card .img-row { margin-top: 8px; }
  .card .img-row img {
    max-width: 100%; max-height: 200px; border-radius: 8px; cursor: pointer;
    border: 1px solid #eee;
  }
  .card .delete-btn {
    font-size: 12px; color: #ccc; cursor: pointer; background: none; border: none;
    padding: 2px 6px; margin-top: 6px;
  }
  .card .delete-btn:hover { color: #dc2626; }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }

  .summary { text-align: right; font-size: 13px; color: #888; margin-top: 14px; }
  .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #bbb; padding-bottom: 30px; }
  .empty-feed { text-align: center; color: #ccc; padding: 40px; font-size: 14px; }

  .streak-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 3000;
    animation: fadeIn .2s;
  }
  .streak-card {
    background: #fff; border-radius: 20px; padding: 36px 32px 28px;
    text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    max-width: 360px; width: 90%;
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .streak-emoji { font-size: 72px; margin-bottom: 8px; animation: bounce 1s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .streak-days { font-size: 48px; font-weight: 800; color: var(--blue); line-height: 1; }
  .streak-msg { font-size: 18px; color: #333; margin: 10px 0 6px; font-weight: 600; }
  .streak-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
  .streak-milestones {
    display: flex; justify-content: center; gap: 8px; margin: 14px 0 20px; flex-wrap: wrap;
  }
  .streak-milestone {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: #f0f0f0; color: #888;
  }
  .streak-milestone.hit { background: #d1fae5; color: #059669; font-weight: 600; }

  .sync-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: #d1fae5; color: #059669; margin-left: 10px;
  }
  .sync-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .token-banner {
    background: #fef3c7; border: 1px solid #fcd34d; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #92400e;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .token-banner .set-btn {
    background: #f59e0b; color: #fff; border: none; padding: 6px 16px;
    border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap;
  }
  .token-banner .set-btn:hover { background: #d97706; }
  .token-banner.hidden { display: none; }

  .ai-banner {
    background: #fee2e2; border: 1px solid #fca5a5; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #991b1b;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .ai-banner.ok {
    background: #d1fae5; border-color: #6ee7b7; color: #065f46;
  }
  .ai-banner .set-btn { background: #ef4444; color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  .ai-banner .set-btn:hover { background: #dc2626; }
  .ai-banner.ok .set-btn { background: #10b981; }
  .ai-banner.hidden { display: none; }

  .settings-modal input[type="password"] {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; margin: 8px 0; outline: none;
  }
  .settings-modal input[type="password"]:focus { border-color: var(--blue); }
  .settings-modal .help { font-size: 12px; color: #888; line-height: 1.6; margin-top: 8px; }
  .settings-modal .help a { color: var(--blue); }

  .ai-feedback {
    margin-top: 10px; padding: 10px 12px;
    background: linear-gradient(135deg, #fef9e7, #fefce8);
    border-radius: 10px; border: 1px solid #fde68a;
    font-size: 13px; color: #92400e; line-height: 1.6;
    position: relative;
  }
  .ai-feedback .ai-label {
    font-size: 11px; color: #b45309; font-weight: 600;
    margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
  }
  .ai-feedback .ai-text { white-space: pre-wrap; word-break: break-word; }
  .ai-dot { animation: aiPulse 1.5s infinite; }
  @keyframes aiPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .btn-ai {
    font-size: 11px; color: #b45309; cursor: pointer; background: linear-gradient(135deg, #fef3c7, #fef9c3);
    border: 1px solid #fcd34d; padding: 4px 12px; border-radius: 12px;
    margin-top: 6px; transition: all .2s;
  }
  .btn-ai:hover { background: #fde68a; transform: translateY(-1px); }
  .btn-ai:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ai-batch {
    font-size: 12px; color: #b45309; cursor: pointer; background: linear-gradient(135deg, #fef3c7, #fef9c3);
    border: 1px solid #fcd34d; padding: 6px 16px; border-radius: 8px;
    margin-left: 8px; transition: all .2s;
  }
  .btn-ai-batch:hover { background: #fde68a; }

  /* ===== 今日状态一览条 ===== */
  .status-bar {
    background: #fff; border-radius: var(--radius); padding: 12px 16px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .status-bar .status-label {
    font-size: 12px; color: #888; font-weight: 600; white-space: nowrap;
    margin-right: 2px;
  }
  .status-bar .status-count {
    font-size: 16px; font-weight: 700; color: var(--blue); margin-right: 10px;
    white-space: nowrap;
  }
  .status-bar .status-count .done { color: var(--green); }
  .status-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 4px 10px; border-radius: 14px; font-size: 12px;
    white-space: nowrap; transition: all .2s;
  }
  .status-chip.done {
    background: #d1fae5; color: #065f46; font-weight: 600;
  }
  .status-chip.undone {
    background: #f3f4f6; color: #bbb;
  }
  .status-chip.leader {
    border: 1px solid #ef4444;
  }
  .status-chip .streak-num {
    font-size: 10px; opacity: 0.8;
  }
  /* ===== 小组今日完成率排行 ===== */
  .group-ranking {
    background: #fff; border-radius: var(--radius); padding: 14px 16px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05); margin-bottom: 16px;
  }
  .group-ranking .gr-title {
    font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .group-ranking .gr-list {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .group-ranking .gr-item {
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 190px; max-width: 230px;
    padding: 8px 12px; border-radius: 10px;
    background: #fafafa; transition: transform .15s;
  }
  .group-ranking .gr-item:hover { transform: translateY(-1px); }
  .group-ranking .gr-rank {
    font-size: 16px; width: 28px; text-align: center; flex-shrink: 0;
  }
  .group-ranking .gr-info { flex: 1; min-width: 0; }
  .group-ranking .gr-name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 2px; }
  .group-ranking .gr-bar-wrap {
    height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 2px;
  }
  .group-ranking .gr-bar {
    height: 100%; border-radius: 3px; transition: width .6s ease;
  }
  .group-ranking .gr-bar.high { background: #10b981; }
  .group-ranking .gr-bar.mid { background: #f59e0b; }
  .group-ranking .gr-bar.low { background: #ef4444; }
  .group-ranking .gr-stat {
    font-size: 11px; color: #888;
  }
  .group-ranking .gr-stat strong { color: #333; }
  /* ===== 欢迎回来汇总条 ===== */
  .welcome-bar {
    background: linear-gradient(135deg, #eff6ff, #dbeafe); border-radius: var(--radius);
    padding: 10px 16px; margin-bottom: 12px; font-size: 13px;
    color: #1e40af; display: flex; align-items: center; gap: 8px;
    animation: slideDown .4s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .welcome-bar .wb-close {
    margin-left: auto; background: none; border: none; font-size: 16px;
    color: #93c5fd; cursor: pointer; padding: 0 4px;
  }

  /* ===== 通知弹条 ===== */
  .toast-container {
    position: fixed; top: 16px; right: 16px; z-index: 2000;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: linear-gradient(135deg, #4a6cf7, #6366f1);
    color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(74,108,247,0.3);
    animation: toastIn .35s ease-out;
    pointer-events: auto; display: flex; align-items: center; gap: 8px;
    max-width: 320px;
    transition: opacity .4s ease, transform .4s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
  .toast.dismissing { opacity: 0; transform: translateX(60px); }
  .toast .toast-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .toast .toast-body { flex: 1; min-width: 0; }
  .toast .toast-name { font-weight: 600; }
  .toast .toast-day { font-size: 11px; opacity: 0.8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📖 读书打卡 <span class="sync-badge"><span class="dot"></span> 全员共享</span></h1>
    <div class="sub">所有人的打卡记录实时同步 · 点击格子打卡</div>
  </div>

  <div class="token-banner" id="tokenBanner">
    <span>⚠️ 还未设置打卡令牌，打卡功能需要先设置令牌才能保存数据</span>
    <button class="set-btn" onclick="openSettings()">设置令牌</button>
  </div>

  <div class="ai-banner" id="aiBanner">
    <span>🤖 AI 反馈未配置：管理员请设置共享 AI Key，或普通成员可在设置中输入自己的 Key</span>
    <button class="set-btn" onclick="openSettings()">配置 AI</button>
  </div>

  <div class="toolbar">
    <label>天数：</label>
    <input type="number" id="dayCount" value="7" min="1" max="31">
    <button class="btn btn-primary" onclick="fetchAndRender()">🔄 刷新</button>
    <button class="btn btn-outline" onclick="openSettings()">⚙️ 设置</button>
    <button class="btn btn-outline" onclick="exportData()">导出</button>
    <button class="btn-ai-batch" onclick="batchAIFeedback()" id="batchAiBtn" style="display:none">🤖 批量 AI 反馈</button>
  </div>

  <div class="welcome-bar" id="welcomeBar" style="display:none"></div>
  <div class="status-bar" id="statusBar"></div>
  <div class="group-ranking" id="groupRanking"></div>

  <div class="table-wrap"><table id="checkTable"></table></div>
  <div class="summary" id="summary"></div>

  <div class="section-title">📝 打卡动态</div>
  <div class="feed" id="feed"></div>
  <div class="empty-feed" id="emptyFeed">还没有打卡记录，点击表格格子开始吧 ~</div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="footer">📖 读书打卡 · 数据通过 GitHub 云端共享 · v2</div>
  <div id="debugInfo" style="text-align:center;font-size:11px;color:#bbb;padding:8px;margin-top:4px"></div>
</div>

<script>
// ===== 配置 =====
const GIST_ID = '9118572982a150ace89f2ba81ecb7999';
const GIST_RAW_URL = 'https://gist.githubusercontent.com/Bob-ui-coder/' + GIST_ID + '/raw/data.json';
const GIST_API_URL = 'https://api.github.com/gists/' + GIST_ID;

const groups = [
  { name: "第1组", members: ["Bob", "Jobs", "Evenc", "Jett", "Lovis"] },
  { name: "第2组", members: ["john", "Brendan", "Sookie", "Monty", "Ryan"] },
  { name: "第3组", members: ["Max", "jackie", "黎瑞"] },
  { name: "第4组", members: ["Ezekiel", "Nora", "leon", "Jasper"] },
  { name: "第5组", members: ["Lina", "Tyler", "Ethan", "Richard", "Nox"] }
];

const LEADERS = new Set(["Evenc", "Brendan", "Max", "Ezekiel", "Ethan"]);

// ===== 管理员 =====
const ADMIN_CODE = 'bob_admin_2026'; // 管理员暗号
function isAdmin() {
  return localStorage.getItem('reading_checkin_admin') === ADMIN_CODE;
}
// 当前用户名（用于权限判断）
function getCurrentUser() {
  return localStorage.getItem('reading_checkin_user') || '';
}

// ===== Token 管理 =====
function getToken() {
  return localStorage.getItem('reading_checkin_token') || '';
}

function setToken(token) {
  localStorage.setItem('reading_checkin_token', token);
}

function updateTokenBanner() {
  const banner = document.getElementById('tokenBanner');
  if (getToken() && getCurrentUser()) {
    banner.classList.add('hidden');
  } else {
    banner.classList.remove('hidden');
    const msg = !getToken() ? '还未设置打卡令牌' : '还未设置你的名字';
    banner.querySelector('span').textContent = '⚠️ ' + msg + '，请先完成设置才能打卡';
  }
  updateAIBanner();
}

function updateAIBanner() {
  const banner = document.getElementById('aiBanner');
  if (!banner) return;
  const config = getAIConfig();
  if (config.key) {
    banner.classList.add('ok');
    banner.classList.remove('hidden');
    banner.querySelector('span').textContent = '✅ AI 反馈已配置（' + (localStorage.getItem('reading_checkin_ai_key') ? '个人 Key' : '团队共享 Key') + '）';
    banner.querySelector('.set-btn').textContent = '修改';
  } else {
    banner.classList.remove('ok', 'hidden');

// 保存共享 AI 配置到 Gist
async function saveSharedAIConfigToGist() {
  const token = getToken();
  if (!token || !sharedAIConfig) return;
  const records = await apiGetRecordsFresh();
  const content = buildGistContent(records);
  await fetch(GIST_API_URL, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ files: { 'data.json': { content } } })
  });
}

// ===== Gist API =====
// 从 CDN 读取（可能有缓存延迟，但不需 token）
async function apiGetRecords() {
  const res = await fetch(GIST_RAW_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error('获取数据失败: ' + res.status);
  const data = await res.json();
  if (data.aiConfig) sharedAIConfig = data.aiConfig;
  return data.records || [];
}

// 从 Gist API 直接读取（实时无缓存，需要 token）
async function apiGetRecordsFresh() {
  const token = getToken();
  if (!token) return await apiGetRecords(); // 没 token 就回退到 CDN
  const res = await fetch(GIST_API_URL, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) throw new Error('获取数据失败: ' + res.status);
  const gist = await res.json();
  const content = gist.files['data.json']?.content || '{"records":[]}';
  const data = JSON.parse(content);
  if (data.aiConfig) sharedAIConfig = data.aiConfig;
  return data.records || [];
}

// 构建 Gist 数据（保留共享 AI 配置）
function buildGistContent(records) {
  const obj = { records };
  if (sharedAIConfig && sharedAIConfig.key) obj.aiConfig = sharedAIConfig;
  return JSON.stringify(obj, null, 2);
}

// 从 Gist 读取 aiConfig（不依赖全局变量，用于 save 时获取最新值）
async function fetchAIConfigFromGist(token) {
  try {
    const getRes = await fetch(GIST_API_URL, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (getRes.ok) {
      const gist = await getRes.json();
      const content = gist.files['data.json']?.content || '{}';
      const data = JSON.parse(content);
      return data.aiConfig || null;
    }
  } catch (e) { /* ignore */ }
  return sharedAIConfig;
}

async function apiSaveRecords(records, mode) {
  const token = getToken();
  if (!token) throw new Error('未设置令牌，请先点击"设置"配置令牌');

  // 确保 sharedAIConfig 是最新的
  const latestAIConfig = await fetchAIConfigFromGist(token);
  if (latestAIConfig) sharedAIConfig = latestAIConfig;

  // mode === 'replace' 时直接覆盖（用于删除/重置）
  // mode === 'merge' 或未指定时合并（用于打卡，防止覆盖别人的数据）
  if (mode === 'replace') {
    const content = buildGistContent(records);
    const patchRes = await fetch(GIST_API_URL, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { 'data.json': { content } }
      })
    });
    if (!patchRes.ok) {
      const err = await patchRes.json().catch(() => ({}));
      throw new Error(err.message || '保存失败');
    }
    return records;
  }

  // 合并模式
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const getRes = await fetch(GIST_API_URL, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!getRes.ok) {
        const err = await getRes.json();
        throw new Error(err.message || '获取Gist失败');
      }
      const gist = await getRes.json();

      let existingRecords = [];
      try {
        const existingContent = gist.files['data.json']?.content || '{"records":[]}';
        const existingData = JSON.parse(existingContent);
        existingRecords = existingData.records || [];
        if (existingData.aiConfig) sharedAIConfig = existingData.aiConfig;
      } catch (e) { /* ignore */ }

      const newKeys = new Set(records.map(r => r.key));
      const merged = [...records];
      for (const r of existingRecords) {
        if (!newKeys.has(r.key)) merged.push(r);
      }

      const mergedContent = buildGistContent(merged);
      const patchRes = await fetch(GIST_API_URL, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: { 'data.json': { content: mergedContent } }
        })
      });

      if (patchRes.ok) return merged;
      if (patchRes.status === 409 && attempt < 2) {
        await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
        continue;
      }
      const err = await patchRes.json();
      throw new Error(err.message || '保存失败');
    } catch (e) {
      if (attempt === 2) throw e;
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
    }
  }
}

async function apiCheckin(name, day, text, image) {
  const records = await apiGetRecordsFresh();
  const key = name + '_' + day;
  const idx = records.findIndex(r => r.key === key);
  const record = { key, name, day: parseInt(day), text: text || '', image: image || null, time: Date.now() };

  if (idx >= 0) records[idx] = record;
  else records.push(record);

  await apiSaveRecords(records);
  return record;
}

async function apiDelete(name, day) {
  const records = await apiGetRecordsFresh();
  const key = name + '_' + day;
  const filtered = records.filter(r => r.key !== key);
  await apiSaveRecords(filtered, 'replace'); // 用 replace 模式，否则合并逻辑会把删的加回来
}

async function apiReset() {
  await apiSaveRecords([], 'replace');
}

async function generateAIFeedback(name, text, image) {
  const config = getAIConfig();
  if (!config.key) {
    return { ok: false, error: 'no_key', message: '未配置 AI API Key' };
  }
  if (!text && !image) {
    return { ok: false, error: 'no_content', message: '没有需要反馈的内容' };
  }

  const systemPrompt = `你是一位温暖、有趣、懂得鼓励人的读书导师。用户分享了他们的读书内容，请你：
1. 用 2-3 句话给出发自内心的鼓励和反馈
2. 对文字心得进行回应，结合内容给出具体反馈
3. 如果提到具体书籍或能识别出书名/内容，可以延伸一个相关的小知识或思考角度
4. 风格要像朋友聊天一样自然，不要像 AI 在写作文
5. 字数控制在 60-120 字之间
6. 不要用"你的心得很好"这类套话开头
7. 如果用户只上传了图片没有文字，请鼓励他/她把图片中的感悟或知识点用几句话总结出来，并表示期待看到文字分享`;

  // DeepSeek 等模型不直接支持 image_url 多模态，图片记录走文字化/通用鼓励路径
  let userContent;
  if (text && image) {
    userContent = `${name} 今天的读书打卡：\n\n${text}\n\n（用户还上传了一张图片作为打卡补充）`;
  } else if (image) {
    userContent = `${name} 今天上传了读书打卡图片（读书笔记/书页拍照）。请用温暖的语气鼓励他/她，并邀请他/她下次可以补充几句文字心得，这样反馈会更具体。`;
  } else {
    userContent = `${name} 今天的读书心得：\n\n${text}`;
  }

  try {
    const res = await fetch(config.baseUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + config.key
      },
      body: JSON.stringify({
        model: config.model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        max_tokens: 300,
        temperature: 0.8
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.error?.message || ('HTTP ' + res.status);
      if (res.status === 401) {
        return { ok: false, error: 'unauthorized', message: 'API Key 无效或已过期，请检查 AI 配置' };
      }
      if (res.status === 429) {
        return { ok: false, error: 'rate_limit', message: 'API 请求太频繁，请稍后再试' };
      }
      return { ok: false, error: 'api_error', message: 'AI 接口错误：' + msg };
    }

    const data = await res.json();
    return { ok: true, feedback: data.choices[0].message.content.trim() };
  } catch (e) {
    console.error('AI 反馈生成失败:', e);
    return { ok: false, error: 'network', message: '网络异常，请检查网络后重试' };
  }
}

async function requestAIFeedback(name, day) {
  if (!getToken()) { alert('请先设置打卡令牌（GitHub Token）才能保存 AI 反馈'); openSettings(); return; }
  const rec = cachedRecords.find(r => r.key === name + '_' + day);
  if (!rec || (!rec.text && !rec.image)) return;

  // 显示加载状态
  const card = document.querySelector(`[data-feedback-key="${name}_${day}"]`);
  const btn = card?.querySelector('.btn-ai');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ AI 思考中...'; }

  const result = await generateAIFeedback(name, rec.text, rec.image || null);
  
  if (result.ok) {
    const feedback = result.feedback;
    // 重新获取最新数据（生成反馈期间可能有其他人打卡），再更新这一条
    const allRecords = await apiGetRecordsFresh();
    const idx = allRecords.findIndex(r => r.key === name + '_' + day);
    if (idx >= 0) {
      allRecords[idx].feedback = feedback;
      allRecords[idx].feedbackTime = Date.now();
    }
    await apiSaveRecords(allRecords, 'replace');
    cachedRecords = allRecords;
    renderAll(cachedRecords);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 反馈'; }
    if (result.error === 'no_key') {
      alert('AI 反馈未配置：\n\n1. 如果你是管理员：打开设置 → 开启管理员模式 → 输入共享 AI Key\n2. 如果你不是管理员：请联系管理员配置 AI Key，或点击设置输入自己的 Key');
    } else if (result.error === 'unauthorized') {
      alert('AI Key 无效或已过期：\n\n请检查设置中的 API Key 是否正确（DeepSeek 平台 keys 页面查看/重新生成）');
    } else {
      alert('AI 反馈生成失败：' + result.message);
    }
  }
}

async function batchAIFeedback() {
  if (!getToken()) { alert('请先设置打卡令牌（GitHub Token）才能生成 AI 反馈'); openSettings(); return; }
  const config = getAIConfig();
  if (!config.key) {
    alert('请先在设置中配置 AI API Key');
    openSettings();
    return;
  }

  const pending = cachedRecords.filter(r => (r.text || r.image) && !r.feedback);
  if (pending.length === 0) {
    alert('所有打卡记录都已有 AI 反馈啦 🎉');
    return;
  }

  if (!confirm(`还有 ${pending.length} 条记录没有 AI 反馈，是否批量生成？（可能需要一些时间）`)) return;

  let firstError = '';

  for (const rec of pending) {
    try {
      const result = await generateAIFeedback(rec.name, rec.text, rec.image || null);
      if (result.ok) {
        const target = recordMap[rec.key];
        if (target) {
          target.feedback = result.feedback;
          target.feedbackTime = Date.now();
        }
        success++;
      } else {
        fail++;
        if (!firstError) firstError = result.message;
      }
    } catch (e) {
      fail++;
      if (!firstError) firstError = e.message;
    }
  }

  // 处理完所有后再获取一次最新数据并合并
  allRecords = await apiGetRecordsFresh();
  for (const rec of pending) {
    if (rec.feedback) {
      const idx = allRecords.findIndex(r => r.key === rec.key);
      if (idx >= 0) {
        allRecords[idx].feedback = rec.feedback;
        allRecords[idx].feedbackTime = rec.feedbackTime;
      }
    }
  }
  await apiSaveRecords(allRecords, 'replace');
  cachedRecords = allRecords;
  renderAll(cachedRecords);

  let msg = `批量生成完成！\n✅ 成功: ${success} 条`;
  if (fail > 0) msg += `\n❌ 失败: ${fail} 条`;
  if (firstError) msg += `\n\n首次失败原因：${firstError}`;
  alert(msg);
}

// ===== 图片压缩 =====
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

      });

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3>${name} · Day ${day}</h3>
        <div class="hint">${isEditing ? '编辑打卡内容' : '记录你的读书心得'}${admin && currentUser !== name ? ' · 🔑 管理员操作' : ''}</div>
        <textarea id="modalText" placeholder="今天读了什么书？有什么收获？">${existing ? escapeHtml(existing.text || '') : ''}</textarea>
        <div class="file-row">
          <label class="upload-btn">
            📷 ${existing && existing.image ? '更换图片' : '添加图片'}
            <input type="file" id="modalFile" accept="image/*" style="display:none" onchange="previewFile(this)">
          </label>
          ${existing && existing.image ? `<img class="preview-thumb" id="previewThumb" src="${existing.image}" style="display:block">` : '<img class="preview-thumb" id="previewThumb">'}
        </div>
        <div class="modal-actions">
          ${isEditing ? '<button class="btn btn-danger" style="margin-right:auto" onclick="deleteFromModal()">🗑️ 删除</button>' : ''}
          <button class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn btn-submit" onclick="submitCheckin()">${isEditing ? '✅ 更新' : '✅ 打卡'}</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
}

async function deleteFromModal() {
  if (!modalTarget) return;
  const name = modalTarget.name;
  const day = modalTarget.day;
  if (!confirm(`确认删除 ${name} Day ${day} 的打卡记录？`)) return;
  closeModal();
  pendingImage = null;
  
  const loadingEl = document.createElement('div');
  loadingEl.className = 'streak-overlay';
  loadingEl.id = 'loadingOverlay';
  loadingEl.innerHTML = '<div class="streak-card"><div class="streak-emoji" style="animation:none">⏳</div><div class="streak-msg">正在删除...</div></div>';
  document.body.appendChild(loadingEl);
  
  try {
    await apiDelete(name, day);
    // 立即从 API 获取最新数据（不走CDN，避免缓存返回已删记录）
    cachedRecords = await apiGetRecordsFresh();
    renderAll(cachedRecords);
    document.getElementById('loadingOverlay').remove();
  } catch (e) {

function closeModal() {
  const el = document.getElementById('modalOverlay');
  if (el) el.remove();
  modalTarget = null;
}

let pendingImage = null;
async function previewFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('图片大小不能超过 5MB'); return; }
  const reader = new FileReader();
  reader.onload = async () => {
    // 压缩图片
    pendingImage = await compressImage(reader.result, 800, 0.6);
    document.getElementById('previewThumb').src = pendingImage;
    document.getElementById('previewThumb').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitCheckin() {
  if (!modalTarget) return;
  const text = document.getElementById('modalText').value.trim();
  if (!text && !pendingImage) { alert('至少填写一段心得或上传一张图片'); return; }

  if (!getToken()) {
    alert('请先设置打卡令牌！点击页面顶部的"设置令牌"按钮。');
    return;
  }

  const targetName = modalTarget.name;
  const targetDay = modalTarget.day;
  const imageData = pendingImage; // 保存图片引用，避免被 closeModal 后清空

  closeModal();
  pendingImage = null;

  // 显示加载提示
  const loadingEl = document.createElement('div');
  loadingEl.className = 'streak-overlay';
  loadingEl.id = 'loadingOverlay';
  loadingEl.innerHTML = '<div class="streak-card"><div class="streak-emoji" style="animation:none">⏳</div><div class="streak-msg">正在保存...</div></div>';
  document.body.appendChild(loadingEl);

  try {
    await apiCheckin(targetName, targetDay, text, imageData || null);
    
    // 自动生成 AI 反馈（立即等待，不异步）
    const aiConfig = getAIConfig();
    if (aiConfig.auto && aiConfig.key && (text || imageData)) {
      loadingEl.querySelector('.streak-msg').textContent = 'AI 正在生成反馈...';
      try {
        const result = await generateAIFeedback(targetName, text, imageData || null);
        if (result.ok) {
          const allRecords = await apiGetRecordsFresh();
          const key = targetName + '_' + targetDay;
          const idx = allRecords.findIndex(r => r.key === key);
          if (idx >= 0) {
            allRecords[idx].feedback = result.feedback;
            allRecords[idx].feedbackTime = Date.now();
            await apiSaveRecords(allRecords, 'replace');
          }
        } else {
          console.error('AI 反馈生成失败:', result.message);
          // AI 失败不影响打卡结果，但保存错误原因到 loading 提示
          loadingEl.querySelector('.streak-msg').textContent = '打卡已保存，AI 反馈未生成';
          await new Promise(r => setTimeout(r, 1500));
        }
      } catch (aiErr) {
        console.error('AI 反馈生成失败:', aiErr);
        // AI 失败不影响打卡结果
      }
    }
    
    // 全部完成后刷新界面
    cachedRecords = await apiGetRecordsFresh();
    renderAll(cachedRecords);
    document.getElementById('loadingOverlay').remove();
    const streak = calcStreak(targetName);
    showStreakPopup(targetName, streak);
    showToast(targetName, targetDay);
  } catch (e) {
    document.getElementById('loadingOverlay').remove();
    console.error('打卡保存失败:', e);
    alert('保存失败: ' + e.message + '\n\n请尝试：\n1. 检查令牌是否正确\n2. 刷新页面重试\n3. 如果持续失败，截图浏览器控制台(F12)的错误信息');
  }
}

// ===== Streak =====
let cachedRecords = [];
let sharedAIConfig = null; // 从 Gist 读取的共享 AI 配置
let lastSeenTime = 0; // 内存中追踪最后看到的记录时间，用于轮询时检测新记录
let isFirstLoad = true; // 是否首次加载（用于显示欢迎回来汇总）

function calcStreak(name) {
  const days = cachedRecords
    .filter(r => r.name === name)
    .map(r => r.day)
    .sort((a, b) => b - a);

  if (days.length === 0) return 0;

  let streak = 1;
  for (let i = 0; i < days.length - 1; i++) {
    if (days[i] - days[i + 1] === 1) streak++;
    else break;
  }
  return streak;
}

const STREAK_EMOJIS = [
  { min: 30, emoji: '🌟', msg: '传奇读书人！', subtitle: '你已经把读书变成了习惯' },
  { min: 21, emoji: '🚀', msg: '超强自律！', subtitle: '21天养成一个好习惯，你做到了' },
  { min: 14, emoji: '👑', msg: '王中之王！', subtitle: '两周不间断，你是所有人的榜样' },
  { min: 10, emoji: '🎯', msg: '十全十美！', subtitle: '两位数连击，读书已入魂' },
  { min: 7,  emoji: '🏆', msg: '一周全勤！', subtitle: '整整一周都在读书，太强了' },
  { min: 5,  emoji: '💪', msg: '渐入佳境！', subtitle: '五天连读，越来越有感觉了' },
  { min: 3,  emoji: '🔥', msg: '开始上瘾！', subtitle: '第三天了，读书的快乐你懂的' },
  { min: 2,  emoji: '✨', msg: '再接再厉！', subtitle: '第二天，保持住这个节奏' },
  { min: 1,  emoji: '🌱', msg: '迈出第一步！', subtitle: '种下一颗读书的种子' },
];

const MILESTONES = [3, 7, 14, 21, 30, 50, 100];

function getStreakInfo(streak) {
  for (const item of STREAK_EMOJIS) {
    if (streak >= item.min) return item;
  }
  return STREAK_EMOJIS[STREAK_EMOJIS.length - 1];
}

function showStreakPopup(name, streak) {
  const info = getStreakInfo(streak);
  const milestonesHtml = MILESTONES.map(m => {
    const hit = streak >= m;
    return `<span class="streak-milestone${hit ? ' hit' : ''}">${hit ? '✅' : '🔒'} ${m}天</span>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'streak-overlay';
  overlay.id = 'streakOverlay';
  overlay.innerHTML = `
    <div class="streak-card">
      <div class="streak-emoji">${info.emoji}</div>
      <div class="streak-days">${streak}</div>
      <div style="font-size:13px;color:#999;">天</div>
      <div class="streak-msg">${info.msg}</div>
      <div class="streak-sub">${name}，${info.subtitle}</div>
      <div class="streak-milestones">${milestonesHtml}</div>
      <button class="btn btn-primary" style="margin-top:8px;font-size:15px;padding:10px 36px;" onclick="document.getElementById('streakOverlay').remove()">🎉 好的！继续加油</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
}

// ===== Table rendering =====
async function fetchAndRender() {
  try {
    const prevRecords = cachedRecords;
    // 有 token 时从 API 直接读取（无CDN缓存），否则从 CDN 读取
    cachedRecords = getToken() ? await apiGetRecordsFresh() : await apiGetRecords();
    document.getElementById('debugInfo').textContent = '✅ 数据已同步 · ' + cachedRecords.length + ' 条记录 · 用户: ' + (getCurrentUser() || '未设置') + (isAdmin() ? ' · 🔑 管理员' : '') + ' · 令牌: ' + (getToken() ? '已设置' : '未设置') + ' · AI: ' + (getAIConfig().key ? '已配置' : '未配置') + ' · ' + new Date().toLocaleTimeString();
    
    // 显示/隐藏批量AI按钮
    const aiConfig = getAIConfig();
    const batchBtn = document.getElementById('batchAiBtn');
    if (batchBtn) {
      const pendingCount = cachedRecords.filter(r => (r.text || r.image) && !r.feedback).length;
      if (aiConfig.key && pendingCount > 0) {
        batchBtn.style.display = '';
        batchBtn.textContent = `🤖 批量 AI 反馈（${pendingCount}条待处理）`;
      } else if (aiConfig.key) {
        batchBtn.style.display = '';
        batchBtn.textContent = '🤖 批量 AI 反馈';
      } else {
        batchBtn.style.display = 'none';
      }
    }
  } catch (e) {
    console.error('获取数据失败:', e);
    cachedRecords = [];
    document.getElementById('debugInfo').textContent = '❌ 获取数据失败: ' + e.message + ' · 用户: ' + (getCurrentUser() || '未设置') + ' · 令牌: ' + (getToken() ? '已设置' : '未设置');
  }
  
  renderAll(cachedRecords);
  
  // 检测新打卡（轮询时）
  if (prevRecords && prevRecords.length > 0 && cachedRecords.length > 0) {
    const prevKeys = new Set(prevRecords.map(r => r.key));
    const newRecords = cachedRecords.filter(r => !prevKeys.has(r.key) && r.time > lastSeenTime);
    if (newRecords.length > 0) {
      for (const nr of newRecords) showToast(nr.name, nr.day);
      lastSeenTime = Math.max(...newRecords.map(r => r.time));
    }
  }
  
  // 首次加载：显示「你离开期间」汇总
  if (isFirstLoad) {
    isFirstLoad = false;
    const lastVisit = parseInt(localStorage.getItem('reading_checkin_last_visit') || '0');
    if (lastVisit > 0 && cachedRecords.length > 0) {
      const recentRecords = cachedRecords.filter(r => r.time > lastVisit);
      if (recentRecords.length > 0) {
        const names = [...new Set(recentRecords.map(r => r.name))];
        const bar = document.getElementById('welcomeBar');
        bar.style.display = 'flex';
        bar.innerHTML = `
          <span>👋 你离开期间，<strong>${names.length}</strong> 人完成了 <strong>${recentRecords.length}</strong> 次打卡</span>
          <span style="font-size:11px;opacity:0.7;">${names.slice(0,5).join('、')}${names.length > 5 ? '...等' : ''}</span>
          <button class="wb-close" onclick="this.parentElement.style.display='none'">✕</button>
        `;
        setTimeout(() => { bar.style.display = 'none'; }, 10000);
      }
    }
    lastSeenTime = Date.now();
  }
  
  // 更新最后访问时间
  localStorage.setItem('reading_checkin_last_visit', Date.now());
}

// ===== 今日日期工具 =====
function getTodayStr() {
  const now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
}

// 从记录中获取今天打卡的人名 Set
function getTodayCheckedIn(records) {
  const today = getTodayStr();
  const set = new Set();
  records.forEach(r => {
    const d = new Date(r.time);
    const ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if (ds === today) set.add(r.name);
  });
  return set;
}

// ===== 打卡状态一览条 =====
function renderStatusBar(records) {
  const bar = document.getElementById('statusBar');
  const todayChecked = getTodayCheckedIn(records);
  const allMembers = [];
  groups.forEach(g => g.members.forEach(m => allMembers.push(m)));
  const checkedCount = allMembers.filter(m => todayChecked.has(m)).length;
  const total = allMembers.length;

  let chips = '';
  allMembers.forEach(name => {
    const done = todayChecked.has(name);
    const streak = calcStreak(name);
    const leaderCls = LEADERS.has(name) ? ' leader' : '';
    const streakBadge = streak > 0 ? `<span class="streak-num">🔥${streak}</span>` : '';
    chips += `<span class="status-chip ${done ? 'done' : 'undone'}${leaderCls}">${name}${streakBadge}</span>`;
  });

  bar.innerHTML = `
    <span class="status-label">📊 今日打卡</span>
    <span class="status-count"><span class="done">${checkedCount}</span>/${total}</span>
    ${chips}
  `;
}

// ===== 小组今日完成率排行 =====
function renderGroupRanking(records) {
  const container = document.getElementById('groupRanking');
  const todayChecked = getTodayCheckedIn(records);
  
  const groupStats = groups.map(g => {
    const checked = g.members.filter(m => todayChecked.has(m)).length;
    const total = g.members.length;
    const rate = total > 0 ? checked / total : 0;
    return { name: g.name, checked, total, rate };
  }).sort((a, b) => b.rate - a.rate);
  
  const rankEmojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  
  container.innerHTML = `
    <div class="gr-title">🏆 小组今日完成率排行</div>
    <div class="gr-list">
      ${groupStats.map((gs, i) => {
        const pct = Math.round(gs.rate * 100);
        const barCls = pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low';
        let rankDisplay = rankEmojis[i] || (i + 1);
        // 如果完成率相同，用相同排名标记
        if (i > 0 && gs.rate === groupStats[i-1].rate) {
          rankDisplay = rankEmojis[i-1] || (i);
        }
        return `
          <div class="gr-item">
            <div class="gr-rank">${rankDisplay}</div>
            <div class="gr-info">
              <div class="gr-name">${gs.name}</div>
              <div class="gr-bar-wrap">
                <div class="gr-bar ${barCls}" style="width:${pct}%"></div>
              </div>
              <div class="gr-stat"><strong>${gs.checked}/${gs.total}</strong> · ${pct}%</div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

// ===== 打卡通知弹条 =====
let toastTimer = null;
function showToast(name, day) {
  const container = document.getElementById('toastContainer');
  const initial = name.charAt(0).toUpperCase();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-avatar">${initial}</div>
    <div class="toast-body">
      <div class="toast-name">${escapeHtml(name)}</div>
      <div class="toast-day">刚完成了 Day ${day} 打卡 🎉</div>
    </div>
  `;
  container.appendChild(toast);

  // 8 秒后自动消失
  setTimeout(() => {
    toast.classList.add('dismissing');
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 400);
  }, 8000);
  
  // 最多保留 5 个通知
  const toasts = container.querySelectorAll('.toast');
  if (toasts.length > 5) toasts[0].remove();
}

function renderAll(allRecords) {
  const days = parseInt(document.getElementById('dayCount').value) || 7;
  const recordMap = {};
  allRecords.forEach(r => { recordMap[r.key] = r; });

  const table = document.getElementById('checkTable');
  let html = '<thead><tr><th class="col-name">姓名</th>';
  for (let d = 1; d <= days; d++) html += `<th>Day ${d}</th>`;
  html += '</tr></thead><tbody>';

  groups.forEach(group => {
    html += `<tr class="group-header"><td colspan="${days + 1}">${group.name}</td></tr>`;
    group.members.forEach(name => {
      const streak = calcStreak(name);
      const streakHtml = streak > 0
        ? `<span class="streak-badge active">🔥${streak}</span>`
        : `<span class="streak-badge zero">🔥0</span>`;
      html += '<tr>';
      html += `<td class="col-name${LEADERS.has(name) ? ' leader' : ''}">${name}${streakHtml}</td>`;
      for (let d = 1; d <= days; d++) {
        const key = `${name}_${d}`;
        const rec = recordMap[key];
        const cls = rec ? (rec.image ? 'cell cell-img checked' : 'cell checked') : 'cell';
        const icon = rec ? '✓' : '+';
        html += `<td><span class="${cls}" data-name="${escapeHtml(name)}" data-day="${d}">${icon}</span></td>`;
      }
      html += '</tr>';
    });
  });

  html += '</tbody>';
  table.innerHTML = html;

  table.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      openModal(cell.dataset.name, parseInt(cell.dataset.day));
    });
  });

  document.getElementById('summary').textContent = `共 ${allRecords.length} 人次已打卡`;
  renderFeed(allRecords);
  renderStatusBar(allRecords);
  renderGroupRanking(allRecords);
}

function renderFeed(records) {
  records.sort((a, b) => b.time - a.time);
  const feedEl = document.getElementById('feed');
  const emptyEl = document.getElementById('emptyFeed');
  if (records.length === 0) {
    feedEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  feedEl.innerHTML = records.map(r => {
    const initial = r.name.charAt(0).toUpperCase();
    const streak = calcStreak(r.name);
    const streakMeta = streak > 0 ? ` 🔥${streak}` : '';
    const dateStr = new Date(r.time).toLocaleString('zh-CN', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const canDelete = isAdmin() || getCurrentUser() === r.name;
    const deleteBtn = canDelete
      ? `<button class="delete-btn" onclick="delRecord('${escapeHtml(r.name)}',${r.day})">删除此条</button>`
      : '';
    
    // AI 反馈区域
    let feedbackHtml = '';
    if (r.feedback) {
      feedbackHtml = `
        <div class="ai-feedback">
          <div class="ai-label">🤖 AI 反馈</div>
          <div class="ai-text">${escapeHtml(r.feedback)}</div>
        </div>`;
    } else if ((r.text || r.image) && getAIConfig().key) {
      // 有 AI Key 才显示生成按钮
      feedbackHtml = `
        <div data-feedback-key="${escapeHtml(r.key)}">
          <button class="btn-ai" onclick="event.stopPropagation();requestAIFeedback('${escapeHtml(r.name)}',${r.day})">🤖 AI 反馈</button>
        </div>`;
    }
    
    return `
      <div class="card">
        <div class="avatar">${initial}</div>
        <div class="body">
          <div class="meta"><strong>${escapeHtml(r.name)}</strong>${streakMeta} · Day ${r.day} · ${dateStr}</div>
          ${r.text ? `<div class="text">${escapeHtml(r.text)}</div>` : ''}
          ${r.image ? `<div class="img-row"><img src="${r.image}" onclick="openLightbox(this.src)" loading="lazy"></div>` : ''}
          ${feedbackHtml}
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

async function delRecord(name, day) {
  // 权限检查
  if (!isAdmin() && getCurrentUser() !== name) {
    alert('你只能删除自己的打卡记录');
    return;
  }
  if (!confirm(`确认删除 ${name} Day ${day} 的打卡记录？`)) return;
  if (!getToken()) { alert('请先设置令牌'); return; }
  try {
    await apiDelete(name, day);
    // 立即从 API 获取最新数据（不走CDN）
    cachedRecords = await apiGetRecordsFresh();
    renderAll(cachedRecords);
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${src}">`;
  lb.addEventListener('click', () => lb.remove());
  document.body.appendChild(lb);
}

function exportData() {
  const records = cachedRecords.sort((a, b) => b.time - a.time);
  const text = records.map(r => {
    return `--- ${r.name} · Day ${r.day} · ${new Date(r.time).toLocaleString('zh-CN')} ---\n${r.text || '(无文字)'}\n${r.image ? '[含图片]' : ''}`;
  }).join('\n\n');
  const blob = new Blob([text || '暂无打卡记录'], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '读书打卡导出.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 初始化 =====
updateTokenBanner();
fetchAndRender();
// 每60秒自动刷新（降低频率避免CDN缓存问题）
setInterval(fetchAndRender, 60000);

// ===== Service Worker 离线缓存 =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ===== 网络状态监控 =====
const offlineBar = document.createElement('div');
offlineBar.id = 'offlineBar';
offlineBar.innerHTML = '🔌 当前离线 · 显示缓存数据';
offlineBar.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:10000;background:#f97316;color:#fff;text-align:center;padding:8px;font-size:14px;font-weight:500;';

window.addEventListener('online', () => {
  offlineBar.style.display = 'none';
  offlineBar.style.background = '#10b981';
  offlineBar.textContent = '✅ 网络已恢复 · 正在刷新...';
  offlineBar.style.display = 'block';
  setTimeout(() => { offlineBar.style.display = 'none'; }, 2000);
  fetchAndRender();
});

window.addEventListener('offline', () => {
  offlineBar.style.display = 'block';
});
</script>
</body>
</html>
