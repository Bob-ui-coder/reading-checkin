<!DOCTYPE html>
<!-- v4.5 - 2026-07-18 数据自动瘦身防超限+图片压缩增强 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>读书打卡</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --primary-light: #eef2ff;
    --green: #10b981;
    --green-light: #ecfdf5;
    --green-dark: #059669;
    --orange: #f59e0b;
    --red: #ef4444;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-2: #475569;
    --text-3: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .container { max-width: 1080px; margin: 0 auto; }

  /* ===== 顶栏 ===== */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 20px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand h1 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .btn-icon {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 15px; display: flex;
    align-items: center; justify-content: center; transition: all .2s;
  }
  .btn-icon:hover { background: var(--border-light); }

  /* ===== 按钮 ===== */
  .btn { padding: 8px 20px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all .2s; font-weight: 500; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: var(--card); color: var(--text-2); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--border-light); }
  .btn-danger { background: #fee2e2; color: var(--red); }
  .btn-danger:hover { background: #fecaca; }

  /* ===== 同步徽章 ===== */
  .sync-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    background: var(--green-light); color: var(--green-dark); font-weight: 500;
  }
  .sync-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ===== 提示条 ===== */
  .token-banner, .ai-banner {
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 12px;
    font-size: 13px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .token-banner { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
  .ai-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .ai-banner.ok { background: var(--green-light); border-color: #a7f3d0; color: #065f46; }
  .token-banner .set-btn, .ai-banner .set-btn {
    border: none; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; white-space: nowrap; font-weight: 500;
  }
  .token-banner .set-btn { background: var(--orange); color: #fff; }
  .ai-banner .set-btn { background: var(--red); color: #fff; }
  .ai-banner.ok .set-btn { background: var(--green); }
  .token-banner .set-btn:hover, .ai-banner .set-btn:hover { opacity: .85; }
  .token-banner.hidden, .ai-banner.hidden { display: none; }

  /* ===== 错误提示条 ===== */
  .error-banner {
    border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px;
    font-size: 13px; display: none; align-items: center; justify-content: space-between; gap: 12px;
    background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
  }
  .error-banner .err-msg { flex: 1; }
  .error-banner .retry-btn {
    border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; white-space: nowrap;
    background: #ef4444; color: #fff;
  }
  .error-banner .retry-btn:hover { background: #dc2626; }
  .error-banner .force-btn {
    border: 1px solid #fca5a5; padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-size: 12px; white-space: nowrap; background: #fff; color: #991b1b;
  }
  .error-banner .force-btn:hover { background: #fef2f2; }

  /* ===== 面板 ===== */
  .panel {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 16px; overflow: hidden;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border-light);
  }
  .panel-title { font-size: 15px; font-weight: 600; color: var(--text); }

  /* ===== Tabs ===== */
  .tab-bar { display: flex; gap: 2px; padding: 6px 12px 0; }
  .tab {
    padding: 10px 18px; border: none; background: none; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--text-3);
    border-bottom: 2px solid transparent; transition: all .2s;
    display: flex; align-items: center; gap: 6px; position: relative;
  }
  .tab:hover { color: var(--text-2); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tab-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
    font-size: 10px; font-weight: 700;
  }
  .tab-badge.alert { background: var(--red); color: #fff; }
  .tab-badge.info { background: var(--primary-light); color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .table-toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; border-bottom: 1px solid var(--border-light);
  }
  .table-toolbar label { font-size: 12px; color: var(--text-3); }
  .table-toolbar input[type="number"] {
    width: 48px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; text-align: center;
  }

  /* ===== 表格 ===== */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  th, td { padding: 7px 4px; text-align: center; font-size: 13px; border-bottom: 1px solid var(--border-light); }
  th { background: #f8fafc; color: var(--text-2); font-weight: 600; white-space: nowrap; font-size: 12px; }
  .col-name { text-align: left; padding-left: 20px; width: 110px; white-space: nowrap; }
  .col-name.leader { color: var(--red); font-weight: 700; }
  th.col-name { text-align: left; padding-left: 20px; }
  .col-name .streak-badge { font-size: 10px; font-weight: 500; margin-left: 3px; }
  .col-name .streak-badge.active { color: var(--orange); }
  .col-name .streak-badge.zero { color: #d1d5db; }
  .group-header td {
    background: var(--primary-light); font-weight: 600; font-size: 13px; color: var(--primary);
    padding: 8px 20px; text-align: left; border-bottom: 1px solid var(--border-light);
  }
  .cell {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
    transition: all .15s; font-size: 14px; user-select: none;
    background: #f8fafc; border: 1.5px solid var(--border); color: var(--text-3);
  }
  .cell:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); transform: scale(1.08); }
  .cell.checked { background: var(--green-light); border: 1.5px solid #a7f3d0; color: var(--green); }
  .cell.checked:hover { background: #d1fae5; }
  .cell-img { background: #eef2ff; border-color: #c7d2fe; }

  /* ===== Summary ===== */
  .summary { text-align: right; font-size: 12px; color: var(--text-3); padding: 8px 20px; }

  /* ===== 打卡动态 ===== */
  .feed { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .empty-feed { text-align: center; color: var(--text-3); padding: 40px; font-size: 14px; }
  .card {
    background: var(--bg); border-radius: var(--radius-sm); padding: 14px;
    display: flex; gap: 12px; transition: all .15s; border: 1px solid var(--border-light);
  }
  .card:hover { border-color: var(--border); box-shadow: var(--shadow); }
  .card .avatar {
    width: 40px; height: 40px; border-radius: 50%; background: var(--primary);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; flex-shrink: 0;
  }
  .card .body { flex: 1; min-width: 0; }
  .card .meta { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
  .card .meta strong { color: var(--text); }
  .card .text { font-size: 14px; color: var(--text-2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .card .img-row { margin-top: 8px; }
  .card .img-row img { max-width: 100%; max-height: 200px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
  .card .delete-btn { font-size: 12px; color: var(--text-3); cursor: pointer; background: none; border: none; padding: 2px 6px; margin-top: 6px; }
  .card .delete-btn:hover { color: var(--red); }

  /* ===== AI 反馈 ===== */
  .ai-feedback {
    margin-top: 10px; padding: 10px 12px;
    background: linear-gradient(135deg, #fefce8, #fef9c3);
    border-radius: 10px; border: 1px solid #fde68a;
    font-size: 13px; color: #92400e; line-height: 1.6;
  }
  .ai-feedback .ai-label { font-size: 11px; color: #b45309; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .ai-feedback .ai-text { white-space: pre-wrap; word-break: break-word; }
  .btn-ai {
    font-size: 11px; color: #b45309; cursor: pointer; background: #fef9c3;
    border: 1px solid #fcd34d; padding: 4px 12px; border-radius: 12px;
    margin-top: 6px; transition: all .2s;
  }
  .btn-ai:hover { background: #fde68a; }
  .btn-ai:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ai-batch {
    font-size: 12px; color: #b45309; cursor: pointer; background: #fef9c3;
    border: 1px solid #fcd34d; padding: 6px 14px; border-radius: 8px; transition: all .2s;
  }
  .btn-ai-batch:hover { background: #fde68a; }

  /* ===== 状态栏 ===== */
  .status-bar { padding: 12px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .status-bar .status-label { font-size: 12px; color: var(--text-3); font-weight: 600; white-space: nowrap; margin-right: 2px; }
  .status-bar .status-count { font-size: 16px; font-weight: 700; color: var(--primary); margin-right: 10px; white-space: nowrap; }
  .status-bar .status-count .done { color: var(--green); }
  .status-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 4px 10px; border-radius: 14px; font-size: 12px;
    white-space: nowrap; transition: all .2s;
  }
  .status-chip.done { background: var(--green-light); color: var(--green-dark); font-weight: 600; }
  .status-chip.undone { background: var(--border-light); color: var(--text-3); }
  .status-chip.leader { border: 1px solid var(--red); }
  .status-chip .streak-num { font-size: 10px; opacity: 0.8; }

  /* ===== 小组排行 ===== */
  .group-ranking { padding: 0 20px 16px; }
  .group-ranking .gr-title { font-size: 12px; font-weight: 600; color: var(--text-3); margin-bottom: 10px; }
  .group-ranking .gr-list { display: flex; gap: 12px; flex-wrap: wrap; }
  .group-ranking .gr-item {
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 180px; max-width: 220px;
    padding: 8px 12px; border-radius: 10px; background: var(--bg); transition: transform .15s;
  }
  .group-ranking .gr-item:hover { transform: translateY(-1px); }
  .group-ranking .gr-rank { font-size: 16px; width: 28px; text-align: center; flex-shrink: 0; }
  .group-ranking .gr-info { flex: 1; min-width: 0; }
  .group-ranking .gr-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .group-ranking .gr-bar-wrap { height: 5px; background: var(--border-light); border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
  .group-ranking .gr-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .group-ranking .gr-bar.high { background: var(--green); }
  .group-ranking .gr-bar.mid { background: var(--orange); }
  .group-ranking .gr-bar.low { background: var(--red); }
  .group-ranking .gr-stat { font-size: 11px; color: var(--text-3); }
  .group-ranking .gr-stat strong { color: var(--text-2); }

  /* ===== 欢迎条 ===== */
  .welcome-bar {
    background: var(--primary-light); border-radius: var(--radius-sm);
    padding: 10px 16px; margin: 12px 20px 0; font-size: 13px;
    color: var(--primary-dark); display: flex; align-items: center; gap: 8px;
    animation: slideDown .4s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .welcome-bar .wb-close { margin-left: auto; background: none; border: none; font-size: 16px; color: var(--primary); cursor: pointer; padding: 0 4px; opacity: 0.6; }

  /* ===== Toast ===== */
  .toast-container { position: fixed; top: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
  .toast {
    background: var(--text); color: #fff; padding: 12px 18px; border-radius: 12px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    animation: toastIn .35s ease-out; pointer-events: auto;
    display: flex; align-items: center; gap: 8px; max-width: 320px;
    transition: opacity .4s ease, transform .4s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
  .toast.dismissing { opacity: 0; transform: translateX(60px); }
  .toast .toast-avatar { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .toast .toast-body { flex: 1; min-width: 0; }
  .toast .toast-name { font-weight: 600; }
  .toast .toast-day { font-size: 11px; opacity: 0.8; }

  /* ===== Lightbox ===== */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }

  /* ===== Streak 弹窗 ===== */
  .streak-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; animation: fadeIn .2s; }
  .streak-card { background: var(--card); border-radius: 22px; padding: 36px 32px 28px; text-align: center; box-shadow: var(--shadow-lg); animation: popIn .4s cubic-bezier(.34,1.56,.64,1); max-width: 360px; width: 90%; }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .streak-emoji { font-size: 64px; margin-bottom: 8px; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .streak-days { font-size: 44px; font-weight: 800; color: var(--primary); line-height: 1; }
  .streak-msg { font-size: 18px; color: var(--text); margin: 10px 0 6px; font-weight: 600; }
  .streak-sub { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }
  .streak-milestones { display: flex; justify-content: center; gap: 8px; margin: 14px 0 20px; flex-wrap: wrap; }
  .streak-milestone { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: var(--border-light); color: var(--text-3); }
  .streak-milestone.hit { background: var(--green-light); color: var(--green-dark); font-weight: 600; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    animation: fadeIn .2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border-radius: 18px; width: 90%; max-width: 440px;
    max-height: 85vh; overflow-y: auto; padding: 28px 24px 20px; box-shadow: var(--shadow-lg);
    animation: slideUp .3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 { font-size: 18px; margin-bottom: 4px; color: var(--text); font-weight: 700; }
  .modal .hint { font-size: 13px; color: var(--text-3); margin-bottom: 16px; }
  .modal textarea {
    width: 100%; height: 100px; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; font-size: 14px; font-family: inherit; resize: vertical;
    outline: none; transition: border .2s;
  }
  .modal textarea:focus { border-color: var(--primary); }
  .modal .file-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .modal .file-row .upload-btn {
    padding: 8px 16px; border: 1.5px dashed var(--border); border-radius: 8px;
    background: var(--bg); cursor: pointer; font-size: 13px; color: var(--text-2); transition: all .2s;
  }
  .modal .file-row .upload-btn:hover { border-color: var(--primary); color: var(--primary); }
  .modal .preview-thumb { max-width: 120px; max-height: 80px; border-radius: 8px; object-fit: cover; display: none; }
  .modal .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal .btn-submit { background: var(--green); color: #fff; }
  .modal .btn-submit:hover { background: var(--green-dark); }
  .modal .btn-cancel { background: var(--border-light); color: var(--text-2); }

  /* ===== Settings ===== */
  .settings-modal input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin: 8px 0; outline: none; }
  .settings-modal input[type="password"]:focus { border-color: var(--primary); }
  .settings-modal .help { font-size: 12px; color: var(--text-3); line-height: 1.6; margin-top: 8px; }
  .settings-modal .help a { color: var(--primary); }

  /* ===== Footer ===== */
  .footer { margin-top: 24px; text-align: center; font-size: 12px; color: var(--text-3); padding-bottom: 20px; }
  #debugInfo { text-align: center; font-size: 11px; color: var(--text-3); padding: 4px; }
</style>
</head>
<body>
<div class="container">
  <header class="top-bar">
    <div class="brand">
      <h1>读书打卡</h1>
      <span class="sync-badge"><span class="dot"></span> 全员共享</span>
    </div>
    <div class="top-actions">
      <button class="btn-icon" onclick="openSettings()" title="设置">⚙️</button>
      <button class="btn-icon" onclick="exportData()" title="导出">📤</button>
      <button class="btn btn-primary" onclick="fetchAndRender()">刷新</button>
    </div>
  </header>

  <div class="token-banner" id="tokenBanner">
    <span>⚠️ 还未设置打卡令牌，打卡功能需要先设置令牌才能保存数据</span>
    <button class="set-btn" onclick="openSettings()">设置令牌</button>
  </div>
  <div class="error-banner" id="errorBanner">
    <span class="err-msg">数据加载失败</span>
    <button class="force-btn" onclick="forceReload()">🔄 强制刷新</button>
    <button class="retry-btn" onclick="fetchAndRender()">重试</button>
  </div>
  <div class="ai-banner" id="aiBanner">
    <span>🤖 AI 反馈未配置：管理员请设置共享 AI Key，或普通成员可在设置中输入自己的 Key</span>
    <button class="set-btn" onclick="openSettings()">配置 AI</button>
  </div>

  <section class="panel">
    <div class="panel-header"><span class="panel-title">今日概览</span></div>
    <div class="welcome-bar" id="welcomeBar" style="display:none"></div>
    <div class="status-bar" id="statusBar"></div>
    <div class="group-ranking" id="groupRanking"></div>
  </section>

  <section class="panel">
    <div class="tab-bar">
      <button class="tab active" id="tabFeed" onclick="switchTab('feed')">
        📊 打卡动态
      </button>
      <button class="tab" id="tabTable" onclick="switchTab('table')">
        📋 打卡进度 <span class="tab-badge alert" id="tableBadge" style="display:none"></span>
      </button>
    </div>
    <div class="tab-content active" id="feedTab">
      <div class="feed" id="feed"></div>
      <div class="empty-feed" id="emptyFeed">还没有打卡记录，点击「打卡进度」标签开始打卡吧 ~</div>
    </div>
    <div class="tab-content" id="tableTab">
      <div class="table-toolbar">

// 保存共享 AI 配置到 Gist
async function saveSharedAIConfigToGist() {
  const token = getToken();
  if (!token || !sharedAIConfig) return;
  const records = await apiGetRecordsFresh();
  const content = buildGistContent(records);
  await fetch(GIST_API_URL, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ files: { 'data.json': { content } } })
  });
}

// ===== Gist API =====
// 从 CDN 读取（多重 fallback，不需要 token）
async function apiGetRecords() {
  // 策略1：GitHub raw URL（带时间戳防缓存）
  try {
    const res = await fetch(GIST_RAW_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      if (data.aiConfig) sharedAIConfig = data.aiConfig;
      return data.records || [];
    }
  } catch (e) {
    console.warn('CDN raw 读取失败:', e.message);
  }
  
  // 策略2：Gist API（无需 auth，公开 Gist 可读取，处理大文件截断）
  try {
    const res = await fetch(GIST_API_URL, { cache: 'no-store' });
    if (res.ok) {
      const gist = await res.json();
      const file = gist.files?.['data.json'];
      let content;
      if (file?.truncated) {
        const rawRes = await fetch((file.raw_url || GIST_RAW_URL) + '?t=' + Date.now(), { cache: 'no-store' });
        content = await rawRes.text();
      } else {
        content = file?.content || '{"records":[]}';
      }
      const data = JSON.parse(content);
      if (data.aiConfig) sharedAIConfig = data.aiConfig;
      return data.records || [];
    }
  } catch (e) {
    console.warn('Gist API 无 auth 读取失败:', e.message);
  }
  
  throw new Error('所有数据源均无法访问，请检查网络或点击「强制刷新」');
}

// 统一：从 Gist 读取完整数据（处理大文件截断）
// Gist API 对超过 1MB 的文件返回 truncated:true，需要 fallback 到 raw URL
async function readFullGistData(token) {
  const res = await fetch(GIST_API_URL, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) throw new Error('获取Gist失败: ' + res.status);
  const gist = await res.json();
  const file = gist.files['data.json'];

  let content;
  if (file && file.truncated) {
    const rawRes = await fetch((file.raw_url || GIST_RAW_URL) + '?t=' + Date.now());
    if (!rawRes.ok) throw new Error('获取完整数据失败: ' + rawRes.status);
    content = await rawRes.text();
  } else {
    content = file?.content || '{"records":[]}';
  }

  try {
    return JSON.parse(content);
  } catch (parseErr) {
    // API 内容解析失败，兜底用 raw URL
    const rawRes = await fetch(GIST_RAW_URL + '?t=' + Date.now());
    if (!rawRes.ok) throw new Error('获取数据失败: ' + rawRes.status);
    const text = await rawRes.text();
    return JSON.parse(text);
  }
}

// 从 Gist API 直接读取（实时无缓存，需要 token）
async function apiGetRecordsFresh() {
  const token = getToken();
  if (!token) return await apiGetRecords();
  const data = await readFullGistData(token);
  if (data.aiConfig) sharedAIConfig = data.aiConfig;
  return data.records || [];
}

// 构建 Gist 数据（保留共享 AI 配置，自动瘦身防止超 1MB）
function buildGistContent(records) {
  // 先尝试原始数据
  let obj = { records };
  if (sharedAIConfig && sharedAIConfig.key) obj.aiConfig = sharedAIConfig;
  let content = JSON.stringify(obj, null, 2);

  // 如果超过 850KB，逐步清理旧图片
  if (content.length > 850000) {
    // 找到最大的 day 值
    const maxDay = Math.max(...records.map(r => r.day || 0), 0);
    // 保留最新 day 的图片，旧 day 的图片替换为占位符
    const trimmed = records.map(r => {
      if (r.image && (r.day || 0) < maxDay) {
        return { ...r, image: '[旧图已自动清理]' };
      }
      return r;
    });
    obj = { records: trimmed };
    if (sharedAIConfig && sharedAIConfig.key) obj.aiConfig = sharedAIConfig;
    content = JSON.stringify(obj, null, 2);

    // 如果还是超过 850KB，把所有图片都清理掉
    if (content.length > 850000) {
      const noImg = records.map(r => {
        if (r.image) return { ...r, image: '[图片已自动清理]' };
        return r;
      });
      obj = { records: noImg };
      if (sharedAIConfig && sharedAIConfig.key) obj.aiConfig = sharedAIConfig;
      content = JSON.stringify(obj, null, 2);
    }
  }

  return content;
}

// 从 Gist 读取 aiConfig（不依赖全局变量，用于 save 时获取最新值）
async function fetchAIConfigFromGist(token) {
  try {
    const data = await readFullGistData(token);
    return data.aiConfig || null;
  } catch (e) { /* ignore */ }
  return sharedAIConfig;
}

async function apiSaveRecords(records, mode) {
  const token = getToken();
  if (!token) throw new Error('未设置令牌，请先点击"设置"配置令牌');

  // 确保 sharedAIConfig 是最新的
  const latestAIConfig = await fetchAIConfigFromGist(token);
  if (latestAIConfig) sharedAIConfig = latestAIConfig;

  // mode === 'replace' 时直接覆盖（用于删除/重置）
  // mode === 'merge' 或未指定时合并（用于打卡，防止覆盖别人的数据）
  if (mode === 'replace') {
    const content = buildGistContent(records);
    const patchRes = await fetch(GIST_API_URL, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { 'data.json': { content } }
      })
    });
    if (!patchRes.ok) {
      const err = await patchRes.json().catch(() => ({}));
      throw new Error(err.message || '保存失败');
    }
    return records;
  }

  // 合并模式：读取完整数据（处理大文件截断），合并后保存
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      // 使用 readFullGistData 处理大文件截断
      const existingData = await readFullGistData(token);
      let existingRecords = existingData.records || [];
      if (existingData.aiConfig) sharedAIConfig = existingData.aiConfig;

      const newKeys = new Set(records.map(r => r.key));
      const merged = [...records];
      for (const r of existingRecords) {
        if (!newKeys.has(r.key)) merged.push(r);
      }

      const mergedContent = buildGistContent(merged);
      const patchRes = await fetch(GIST_API_URL, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: { 'data.json': { content: mergedContent } }
        })
      });

      if (patchRes.ok) return merged;
      if (patchRes.status === 409 && attempt < 2) {
        await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
        continue;
      }
      const err = await patchRes.json();
      throw new Error(err.message || '保存失败');
    } catch (e) {
      if (attempt === 2) throw e;
      await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
    }
  }
}

async function apiCheckin(name, day, text, image) {
  const records = await apiGetRecordsFresh();
  const key = name + '_' + day;
  const idx = records.findIndex(r => r.key === key);
  const record = { key, name, day: parseInt(day), text: text || '', image: image || null, time: Date.now() };

  if (idx >= 0) records[idx] = record;
  else records.push(record);

  await apiSaveRecords(records);
  return record;
}

async function apiDelete(name, day) {
  const records = await apiGetRecordsFresh();
  const key = name + '_' + day;
  const filtered = records.filter(r => r.key !== key);
  await apiSaveRecords(filtered, 'replace'); // 用 replace 模式，否则合并逻辑会把删的加回来
}

async function apiReset() {
  await apiSaveRecords([], 'replace');
}

// ===== AI 反馈 =====
function getAIConfig() {
  // 优先使用本地配置（个人覆盖）
  const localKey = localStorage.getItem('reading_checkin_ai_key');
  if (localKey) {
    return {
      baseUrl: (localStorage.getItem('reading_checkin_ai_base_url') || 'https://api.deepseek.com/v1').replace(/\/$/, ''),
      key: localKey,
      model: localStorage.getItem('reading_checkin_ai_model') || 'deepseek-chat',
      auto: localStorage.getItem('reading_checkin_ai_auto') !== 'false'
    };
  }
  // 使用管理员在 Gist 中配置的共享 AI Key（全员可用）
  if (sharedAIConfig && sharedAIConfig.key) {
    return {
      baseUrl: (sharedAIConfig.baseUrl || 'https://api.deepseek.com/v1').replace(/\/$/, ''),
      key: sharedAIConfig.key,
      model: sharedAIConfig.model || 'deepseek-chat',
      auto: sharedAIConfig.auto !== false
    };
  }
  return {
    baseUrl: 'https://api.deepseek.com/v1',
    key: '',
    model: 'deepseek-chat',
    auto: true
  };
}

async function generateAIFeedback(name, text, image) {
  const config = getAIConfig();
  if (!config.key) {
    return { ok: false, error: 'no_key', message: '未配置 AI API Key' };
  }
  if (!text && !image) {
    return { ok: false, error: 'no_content', message: '没有需要反馈的内容' };
  }

  const systemPrompt = `你是一位温暖、有趣、懂得鼓励人的读书导师。用户分享了他们的读书内容，请你：
1. 用 2-3 句话给出发自内心的鼓励和反馈
2. 对文字心得进行回应，结合内容给出具体反馈
3. 如果提到具体书籍或能识别出书名/内容，可以延伸一个相关的小知识或思考角度
4. 风格要像朋友聊天一样自然，不要像 AI 在写作文
5. 字数控制在 60-120 字之间
6. 不要用"你的心得很好"这类套话开头
7. 如果用户只上传了图片没有文字，请鼓励他/她把图片中的感悟或知识点用几句话总结出来，并表示期待看到文字分享`;

  // DeepSeek 等模型不直接支持 image_url 多模态，图片记录走文字化/通用鼓励路径
  let userContent;
  if (text && image) {
    userContent = `${name} 今天的读书打卡：\n\n${text}\n\n（用户还上传了一张图片作为打卡补充）`;
  } else if (image) {
    userContent = `${name} 今天上传了读书打卡图片（读书笔记/书页拍照）。请用温暖的语气鼓励他/她，并邀请他/她下次可以补充几句文字心得，这样反馈会更具体。`;
  } else {
    userContent = `${name} 今天的读书心得：\n\n${text}`;
  }

  try {
    const res = await fetch(config.baseUrl + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + config.key
      },
      body: JSON.stringify({
        model: config.model,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ],
        max_tokens: 300,
        temperature: 0.8
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.error?.message || ('HTTP ' + res.status);
      if (res.status === 401) {
        return { ok: false, error: 'unauthorized', message: 'API Key 无效或已过期，请检查 AI 配置' };
      }
      if (res.status === 429) {
        return { ok: false, error: 'rate_limit', message: 'API 请求太频繁，请稍后再试' };
      }
      return { ok: false, error: 'api_error', message: 'AI 接口错误：' + msg };
    }

    const data = await res.json();
    return { ok: true, feedback: data.choices[0].message.content.trim() };
  } catch (e) {
    console.error('AI 反馈生成失败:', e);
    return { ok: false, error: 'network', message: '网络异常，请检查网络后重试' };
  }
}

async function requestAIFeedback(name, day) {
  if (!getToken()) { alert('请先设置打卡令牌（GitHub Token）才能保存 AI 反馈'); openSettings(); return; }
  const rec = cachedRecords.find(r => r.key === name + '_' + day);
  if (!rec || (!rec.text && !rec.image)) return;

  // 显示加载状态
  const card = document.querySelector(`[data-feedback-key="${name}_${day}"]`);
  const btn = card?.querySelector('.btn-ai');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ AI 思考中...'; }

  const result = await generateAIFeedback(name, rec.text, rec.image || null);
  
  if (result.ok) {
    const feedback = result.feedback;
    // 重新获取最新数据（生成反馈期间可能有其他人打卡），再更新这一条
    const allRecords = await apiGetRecordsFresh();
    const idx = allRecords.findIndex(r => r.key === name + '_' + day);
    if (idx >= 0) {
      allRecords[idx].feedback = feedback;
      allRecords[idx].feedbackTime = Date.now();
    }
    await apiSaveRecords(allRecords, 'replace');
    cachedRecords = allRecords;
    renderAll(cachedRecords);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 反馈'; }
    if (result.error === 'no_key') {
      alert('AI 反馈未配置：\n\n1. 如果你是管理员：打开设置 → 开启管理员模式 → 输入共享 AI Key\n2. 如果你不是管理员：请联系管理员配置 AI Key，或点击设置输入自己的 Key');
    } else if (result.error === 'unauthorized') {
      alert('AI Key 无效或已过期：\n\n请检查设置中的 API Key 是否正确（DeepSeek 平台 keys 页面查看/重新生成）');
    } else {
      alert('AI 反馈生成失败：' + result.message);
    }
  }
}

async function batchAIFeedback() {
  if (!getToken()) { alert('请先设置打卡令牌（GitHub Token）才能生成 AI 反馈'); openSettings(); return; }
  const config = getAIConfig();
  if (!config.key) {
    alert('请先在设置中配置 AI API Key');
    openSettings();
    return;
  }

  const pending = cachedRecords.filter(r => (r.text || r.image) && !r.feedback);
  if (pending.length === 0) {
    alert('所有打卡记录都已有 AI 反馈啦 🎉');
    return;
  }

  if (!confirm(`还有 ${pending.length} 条记录没有 AI 反馈，是否批量生成？（可能需要一些时间）`)) return;

  let success = 0;
  let fail = 0;
  let firstError = '';

  // 先获取最新数据
  let allRecords = await apiGetRecordsFresh();
  const recordMap = {};
  allRecords.forEach(r => { recordMap[r.key] = r; });

  for (const rec of pending) {
    try {
      const result = await generateAIFeedback(rec.name, rec.text, rec.image || null);
      if (result.ok) {
        const target = recordMap[rec.key];
        if (target) {
          target.feedback = result.feedback;
          target.feedbackTime = Date.now();
        }
        success++;
      } else {
        fail++;
        if (!firstError) firstError = result.message;
      }
    } catch (e) {
      fail++;
      if (!firstError) firstError = e.message;
    }
  }

  // 保存到 Gist
  await apiSaveRecords(allRecords, 'replace');
  cachedRecords = allRecords;
  renderAll(cachedRecords);

  let msg = `批量生成完成！\n✅ 成功: ${success} 条`;
  if (fail > 0) msg += `\n❌ 失败: ${fail} 条`;
  if (firstError) msg += `\n\n首次失败原因：${firstError}`;
  alert(msg);
}

// ===== 图片压缩 =====
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ===== Streak =====
let cachedRecords = [];
let sharedAIConfig = null; // 从 Gist 读取的共享 AI 配置
let lastSeenTime = 0; // 内存中追踪最后看到的记录时间，用于轮询时检测新记录
let isFirstLoad = true; // 是否首次加载（用于显示欢迎回来汇总）

function calcStreak(name) {
  const days = cachedRecords
    .filter(r => r.name === name)
    .map(r => r.day)
    .sort((a, b) => b - a);

  if (days.length === 0) return 0;

  let streak = 1;
  for (let i = 0; i < days.length - 1; i++) {
    if (days[i] - days[i + 1] === 1) streak++;
    else break;
  }
  return streak;
}

// ===== Table rendering =====
const PAGE_VERSION = 'v4.5';
async function fetchAndRender() {
  try {
    const prevRecords = cachedRecords;
    
    // 多重 fallback 策略：API → CDN → CDN备用 → localStorage
    let records = null;
    let dataSource = '';
    
    if (getToken()) {
      // 策略1：从 Gist API 读取（实时无缓存）
      try {
        records = await apiGetRecordsFresh();
        dataSource = 'API';
      } catch (apiErr) {
        console.warn('API 读取失败，尝试 CDN:', apiErr.message);
        // 策略2：fallback 到 CDN
        try {
          records = await apiGetRecords();
          dataSource = 'CDN(降级)';
        } catch (cdnErr) {
          console.warn('CDN 读取也失败:', cdnErr.message);
          throw cdnErr;
        }
      }
    } else {
      // 无 token：直接从 CDN 读取
      records = await apiGetRecords();
      dataSource = 'CDN';
    }
    
    cachedRecords = records || [];
    
    // 隐藏错误提示
    const errBanner = document.getElementById('errorBanner');
    if (errBanner) errBanner.style.display = 'none';
    
    document.getElementById('debugInfo').innerHTML = '✅ ' + PAGE_VERSION + ' · ' + dataSource + ' · ' + cachedRecords.length + ' 条 · ' + (getCurrentUser() || '未设置') + (isAdmin() ? ' · 🔑管理员' : '') + ' · ' + new Date().toLocaleTimeString();
    
    // 显示/隐藏批量AI按钮
    const aiConfig = getAIConfig();
    const batchBtn = document.getElementById('batchAiBtn');
    if (batchBtn) {
      const pendingCount = cachedRecords.filter(r => (r.text || r.image) && !r.feedback).length;
      if (aiConfig.key && pendingCount > 0) {
        batchBtn.style.display = '';
        batchBtn.textContent = `🤖 批量 AI 反馈（${pendingCount}条待处理）`;
      } else if (aiConfig.key) {
        batchBtn.style.display = '';
        batchBtn.textContent = '🤖 批量 AI 反馈';
      } else {
        batchBtn.style.display = 'none';
      }
    }
  } catch (e) {
    console.error('获取数据失败:', e);
    cachedRecords = [];
    
    // 显示明显的错误提示+重试按钮
    const errBanner = document.getElementById('errorBanner');
    if (errBanner) {
      errBanner.style.display = 'flex';
      errBanner.querySelector('.err-msg').textContent = '数据加载失败：' + e.message;
    }
    
    document.getElementById('debugInfo').innerHTML = '❌ ' + PAGE_VERSION + ' · 获取失败: ' + e.message + ' · 令牌: ' + (getToken() ? '已设置' : '未设置');
  }
  
  renderAll(cachedRecords);
  
  // 检测新打卡（轮询时）
  if (prevRecords && prevRecords.length > 0 && cachedRecords.length > 0) {
    const prevKeys = new Set(prevRecords.map(r => r.key));
    const newRecords = cachedRecords.filter(r => !prevKeys.has(r.key) && r.time > lastSeenTime);
    if (newRecords.length > 0) {
      for (const nr of newRecords) showToast(nr.name, nr.day);
      lastSeenTime = Math.max(...newRecords.map(r => r.time));
    }
  }
  
  // 首次加载：显示「你离开期间」汇总
  if (isFirstLoad) {
    isFirstLoad = false;
    const lastVisit = parseInt(localStorage.getItem('reading_checkin_last_visit') || '0');
    if (lastVisit > 0 && cachedRecords.length > 0) {
      const recentRecords = cachedRecords.filter(r => r.time > lastVisit);
      if (recentRecords.length > 0) {
        const names = [...new Set(recentRecords.map(r => r.name))];
        const bar = document.getElementById('welcomeBar');
        bar.style.display = 'flex';
        bar.innerHTML = `
          <span>👋 你离开期间，<strong>${names.length}</strong> 人完成了 <strong>${recentRecords.length}</strong> 次打卡</span>
          <span style="font-size:11px;opacity:0.7;">${names.slice(0,5).join('、')}${names.length > 5 ? '...等' : ''}</span>
          <button class="wb-close" onclick="this.parentElement.style.display='none'">✕</button>
        `;
        setTimeout(() => { bar.style.display = 'none'; }, 10000);
      }
    }
    lastSeenTime = Date.now();
  }
  
  // 更新最后访问时间
  localStorage.setItem('reading_checkin_last_visit', Date.now());
}

// ===== 今日日期工具 =====
function getTodayStr() {
  const now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
}

// 从记录中获取今天打卡的人名 Set
function getTodayCheckedIn(records) {
  const today = getTodayStr();
  const set = new Set();
  records.forEach(r => {
    const d = new Date(r.time);
    const ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if (ds === today) set.add(r.name);
  });
  return set;
}

// ===== 打卡状态一览条 =====
function renderStatusBar(records) {
  const bar = document.getElementById('statusBar');
  const todayChecked = getTodayCheckedIn(records);
  const allMembers = [];
  groups.forEach(g => g.members.forEach(m => allMembers.push(m)));
  const checkedCount = allMembers.filter(m => todayChecked.has(m)).length;
  const total = allMembers.length;

  let chips = '';
  allMembers.forEach(name => {
    const done = todayChecked.has(name);
    const streak = calcStreak(name);
    const leaderCls = LEADERS.has(name) ? ' leader' : '';
    const streakBadge = streak > 0 ? `<span class="streak-num">🔥${streak}</span>` : '';
    chips += `<span class="status-chip ${done ? 'done' : 'undone'}${leaderCls}">${name}${streakBadge}</span>`;
  });

  bar.innerHTML = `
    <span class="status-label">📊 今日打卡</span>
    <span class="status-count"><span class="done">${checkedCount}</span>/${total}</span>
    ${chips}
  `;
}

// ===== 小组今日完成率排行 =====
function renderGroupRanking(records) {
  const container = document.getElementById('groupRanking');
  const todayChecked = getTodayCheckedIn(records);
  
  const groupStats = groups.map(g => {
    const checked = g.members.filter(m => todayChecked.has(m)).length;
    const total = g.members.length;
    const rate = total > 0 ? checked / total : 0;
    return { name: g.name, checked, total, rate };
  }).sort((a, b) => b.rate - a.rate);
  
  const rankEmojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  
  container.innerHTML = `
    <div class="gr-title">🏆 小组今日完成率排行</div>
    <div class="gr-list">
      ${groupStats.map((gs, i) => {
        const pct = Math.round(gs.rate * 100);
        const barCls = pct >= 80 ? 'high' : pct >= 40 ? 'mid' : 'low';
        let rankDisplay = rankEmojis[i] || (i + 1);
        // 如果完成率相同，用相同排名标记
        if (i > 0 && gs.rate === groupStats[i-1].rate) {
          rankDisplay = rankEmojis[i-1] || (i);
        }
        return `
          <div class="gr-item">
            <div class="gr-rank">${rankDisplay}</div>
            <div class="gr-info">
              <div class="gr-name">${gs.name}</div>
              <div class="gr-bar-wrap">
                <div class="gr-bar ${barCls}" style="width:${pct}%"></div>
              </div>
              <div class="gr-stat"><strong>${gs.checked}/${gs.total}</strong> · ${pct}%</div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

// ===== 打卡通知弹条 =====
let toastTimer = null;
function showToast(name, day) {
  const container = document.getElementById('toastContainer');
  const initial = name.charAt(0).toUpperCase();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-avatar">${initial}</div>
    <div class="toast-body">
      <div class="toast-name">${escapeHtml(name)}</div>
      <div class="toast-day">刚完成了 Day ${day} 打卡 🎉</div>
    </div>
  `;
  container.appendChild(toast);

  // 8 秒后自动消失
  setTimeout(() => {
    toast.classList.add('dismissing');
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 400);
  }, 8000);
  
  // 最多保留 5 个通知
  const toasts = container.querySelectorAll('.toast');
  if (toasts.length > 5) toasts[0].remove();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (tab === 'feed') {
    document.getElementById('tabFeed').classList.add('active');
    document.getElementById('feedTab').classList.add('active');
  } else {
    document.getElementById('tabTable').classList.add('active');
    document.getElementById('tableTab').classList.add('active');
  }
}

function renderAll(allRecords) {
  const days = parseInt(document.getElementById('dayCount').value) || 7;
  const recordMap = {};
  allRecords.forEach(r => { recordMap[r.key] = r; });

  const table = document.getElementById('checkTable');
  let html = '<thead><tr><th class="col-name">姓名</th>';
  for (let d = 1; d <= days; d++) html += `<th>Day ${d}</th>`;
  html += '</tr></thead><tbody>';

  groups.forEach(group => {
    html += `<tr class="group-header"><td colspan="${days + 1}">${group.name}</td></tr>`;
    group.members.forEach(name => {
      const streak = calcStreak(name);
      const streakHtml = streak > 0
        ? `<span class="streak-badge active">🔥${streak}</span>`
        : `<span class="streak-badge zero">🔥0</span>`;
      html += '<tr>';
      html += `<td class="col-name${LEADERS.has(name) ? ' leader' : ''}">${name}${streakHtml}</td>`;
      for (let d = 1; d <= days; d++) {
        const key = `${name}_${d}`;
        const rec = recordMap[key];
        const cls = rec ? (rec.image ? 'cell cell-img checked' : 'cell checked') : 'cell';
        const icon = rec ? '✓' : '+';
        html += `<td><span class="${cls}" data-name="${escapeHtml(name)}" data-day="${d}">${icon}</span></td>`;
      }
      html += '</tr>';
    });
  });

  html += '</tbody>';
  table.innerHTML = html;

  table.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      openModal(cell.dataset.name, parseInt(cell.dataset.day));
    });
  });

  document.getElementById('summary').textContent = `共 ${allRecords.length} 人次已打卡`;
  renderFeed(allRecords);
  renderStatusBar(allRecords);
  renderGroupRanking(allRecords);

  // 更新「打卡进度」Tab 上的未打卡人数徽章
  const todayChecked = getTodayCheckedIn(allRecords);
  const allMembers = [];
  groups.forEach(g => g.members.forEach(m => allMembers.push(m)));
  const uncheckedCount = allMembers.filter(m => !todayChecked.has(m)).length;
  const badge = document.getElementById('tableBadge');
  if (badge && uncheckedCount > 0) {
    badge.style.display = '';
    badge.textContent = uncheckedCount + '人未打卡';
  } else if (badge) {
    badge.style.display = 'none';
  }
}

function renderFeed(records) {
  records.sort((a, b) => b.time - a.time);
  const feedEl = document.getElementById('feed');
  const emptyEl = document.getElementById('emptyFeed');
  if (records.length === 0) {
    feedEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  feedEl.innerHTML = records.map(r => {
    const initial = r.name.charAt(0).toUpperCase();
    const streak = calcStreak(r.name);
    const streakMeta = streak > 0 ? ` 🔥${streak}` : '';
    const dateStr = new Date(r.time).toLocaleString('zh-CN', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const canDelete = isAdmin() || getCurrentUser() === r.name;
    const deleteBtn = canDelete
      ? `<button class="delete-btn" onclick="delRecord('${escapeHtml(r.name)}',${r.day})">删除此条</button>`
      : '';
    
    // AI 反馈区域
    let feedbackHtml = '';
    if (r.feedback) {
      feedbackHtml = `
        <div class="ai-feedback">
          <div class="ai-label">🤖 AI 反馈</div>
          <div class="ai-text">${escapeHtml(r.feedback)}</div>
        </div>`;
    } else if ((r.text || r.image) && getAIConfig().key) {
      // 有 AI Key 才显示生成按钮
      feedbackHtml = `
        <div data-feedback-key="${escapeHtml(r.key)}">
          <button class="btn-ai" onclick="event.stopPropagation();requestAIFeedback('${escapeHtml(r.name)}',${r.day})">🤖 AI 反馈</button>
        </div>`;
    }
    
    return `
      <div class="card">
        <div class="avatar">${initial}</div>
        <div class="body">
          <div class="meta"><strong>${escapeHtml(r.name)}</strong>${streakMeta} · Day ${r.day} · ${dateStr}</div>
          ${r.text ? `<div class="text">${escapeHtml(r.text)}</div>` : ''}
          ${r.image ? `<div class="img-row"><img src="${r.image}" onclick="openLightbox(this.src)" loading="lazy"></div>` : ''}
          ${feedbackHtml}
          ${deleteBtn}
        </div>
      </div>`;
  }).join('');
}

async function delRecord(name, day) {
  // 权限检查
  if (!isAdmin() && getCurrentUser() !== name) {
    alert('你只能删除自己的打卡记录');
    return;
  }
  if (!confirm(`确认删除 ${name} Day ${day} 的打卡记录？`)) return;
  if (!getToken()) { alert('请先设置令牌'); return; }
  try {
    await apiDelete(name, day);
    // 立即从 API 获取最新数据（不走CDN）
    cachedRecords = await apiGetRecordsFresh();
    renderAll(cachedRecords);
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${src}">`;
  lb.addEventListener('click', () => lb.remove());
  document.body.appendChild(lb);
}

function exportData() {
  const records = cachedRecords.sort((a, b) => b.time - a.time);
  const text = records.map(r => {
    return `--- ${r.name} · Day ${r.day} · ${new Date(r.time).toLocaleString('zh-CN')} ---\n${r.text || '(无文字)'}\n${r.image ? '[含图片]' : ''}`;
  }).join('\n\n');
  const blob = new Blob([text || '暂无打卡记录'], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '读书打卡导出.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== 强制刷新（清除 SW 缓存后重载）=====
async function forceReload() {
  // 注销所有 Service Worker
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      console.log('All service workers unregistered');
    } catch (e) {
      console.warn('SW unregister failed:', e);
    }
  }
  // 清除所有缓存
  if ('caches' in window) {
    try {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      console.log('All caches cleared');
    } catch (e) {
      console.warn('Cache clear failed:', e);
    }
  }
  // 强制重载（绕过缓存）
  window.location.href = window.location.pathname + '?t=' + Date.now();
}

// ===== 初始化 =====
updateTokenBanner();
// 首次加载，失败后自动重试一次
fetchAndRender().catch(() => {
  setTimeout(() => fetchAndRender(), 2000);
});
// 如果首次加载后数据为空，3秒后自动重试
setTimeout(() => {
  if (cachedRecords.length === 0) {
    console.log('数据为空，自动重试...');
    fetchAndRender();
  }
}, 3000);
// 天数改变时立即重渲染
document.getElementById('dayCount').addEventListener('change', () => renderAll(cachedRecords));
// 每60秒自动刷新（降低频率避免CDN缓存问题）
setInterval(fetchAndRender, 60000);

// ===== Service Worker 离线缓存（带强制更新检测）=====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // 检测 SW 更新
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated') {
            // 新 SW 已激活，强制重载页面以加载最新代码
            console.log('SW updated, reloading page...');
            window.location.reload();
          }
        });
      }
    });
    // 如果有等待中的 SW，直接激活它
    if (reg.waiting) {
      reg.waiting.postMessage('SKIP_WAITING');
    }
  }).catch(e => {
    // SW 注册失败时注销旧 SW
    console.warn('SW registration failed, unregistering:', e);
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  });
  
  // 监听来自 SW 的消息
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data === 'SKIP_WAITING') {
      // 通知等待中的 SW 直接跳过等待
    }
  });
  
  // 页面加载时检查是否有旧的 SW 需要清理
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      reg.update().catch(() => {});
    });
  });
}

offlineBar.id = 'offlineBar';

offlineBar.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:10000;background:#f97316;color:#fff;text-align:center;padding:8px;font-size:14px;font-weight:500;';

  fetchAndRender();
});

window.addEventListener('offline', () => {
  offlineBar.style.display = 'block';
});
